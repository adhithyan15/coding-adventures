[workspace]

[package]
name = "lattice-lexer-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust Lattice lexer"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
grammar_wasm_support = { package = "grammar-wasm-support", path = "../../rust/grammar-wasm-support" }
language_lexer = { package = "coding-adventures-lattice-lexer", path = "../../rust/lattice-lexer" }
wasm-bindgen = "0.2"
