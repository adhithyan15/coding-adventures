# Zero dependencies. We declare Ruby's C API functions ourselves using
# extern "C" — no rb-sys, no Magnus, no bindgen, no build-time headers.
# These function signatures have been stable since Ruby 1.8 (2003).

[package]
name = "ruby-bridge"
version = "0.1.0"
edition = "2021"
description = "Thin safe Rust wrapper over Ruby's C API — zero dependencies, no Magnus, no macros"

[dependencies]
# None. That's the point.
