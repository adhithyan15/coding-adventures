[workspace]

[package]
name = "java-parser-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust Java parser"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
grammar_wasm_support = { package = "grammar-wasm-support", path = "../../rust/grammar-wasm-support" }
language_lexer = { package = "coding-adventures-java-lexer", path = "../../rust/java-lexer" }
language_parser = { package = "coding-adventures-java-parser", path = "../../rust/java-parser" }
wasm-bindgen = "0.2"
