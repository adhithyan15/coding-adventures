[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-algol-wasm-compiler"
version = "0.1.0"
description = "Package the Python ALGOL 60 compiler lane as WebAssembly"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-graph",
    "coding-adventures-directed-graph",
    "coding-adventures-state-machine",
    "coding-adventures-grammar-tools",
    "coding-adventures-cli-builder",
    "coding-adventures-lexer",
    "coding-adventures-parser",
    "coding-adventures-algol-lexer",
    "coding-adventures-algol-parser",
    "coding-adventures-algol-type-checker",
    "coding-adventures-compiler-ir",
    "coding-adventures-algol-ir-compiler",
    "coding-adventures-virtual-machine",
    "coding-adventures-wasm-leb128",
    "coding-adventures-wasm-types",
    "coding-adventures-wasm-opcodes",
    "coding-adventures-wasm-module-parser",
    "coding-adventures-wasm-validator",
    "coding-adventures-wasm-execution",
    "coding-adventures-wasm-runtime",
    "coding-adventures-wasm-module-encoder",
    "coding-adventures-ir-to-wasm-compiler",
    "coding-adventures-ir-to-wasm-validator",
]

[project.scripts]
algol60-wasm = "algol_wasm_compiler.cli:main"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/algol_wasm_compiler"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=algol_wasm_compiler --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/algol_wasm_compiler"]

[tool.coverage.report]
fail_under = 80
show_missing = true
