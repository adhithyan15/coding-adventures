[workspace]

[package]
name = "paint-vm-metal-native-perl"
version = "0.1.0"
edition = "2021"
description = "Perl XS extension exposing the Metal Paint VM from Rust"
build = "build.rs"

[lib]
name = "PaintVmMetalNative"
crate-type = ["cdylib"]

[dependencies]
perl-bridge = { path = "../../rust/perl-bridge" }
paint-instructions = { path = "../../rust/paint-instructions" }
paint-metal = { path = "../../rust/paint-metal" }
