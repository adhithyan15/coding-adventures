[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-sql-csv-source"
version = "0.1.0"
description = "SQL CSV DataSource — connects the SQL execution engine to CSV files"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["sql", "csv", "datasource", "education"]
dependencies = [
    "coding-adventures-csv-parser @ file:../csv-parser",
    "coding-adventures-sql-execution-engine @ file:../sql-execution-engine",
    "coding-adventures-sql-parser @ file:../sql-parser"
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/sql_csv_source"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = ["ANN401"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=sql_csv_source --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/sql_csv_source"]

[tool.coverage.report]
fail_under = 80
show_missing = true
