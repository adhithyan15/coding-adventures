[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-os-kernel"
version = "0.1.0"
description = "S04 OS Kernel -- minimal monolithic kernel with process management, scheduler, and syscalls"
requires-python = ">=3.12"
dependencies = [
    "coding-adventures-display",
    "coding-adventures-interrupt-handler",
    "coding-adventures-riscv-simulator",
]
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["kernel", "os", "scheduler", "syscall", "computer-architecture", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10", "coding-adventures-arithmetic", "coding-adventures-cpu-simulator", "coding-adventures-display", "coding-adventures-interrupt-handler", "coding-adventures-logic-gates", "coding-adventures-riscv-simulator"]

[tool.hatch.build.targets.wheel]
packages = ["src/os_kernel"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=os_kernel --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/os_kernel"]

[tool.coverage.report]
fail_under = 90
show_missing = true
