# ================================================================
# CI — Incremental, parallel monorepo build with conditional toolchains
# ================================================================
#
# Single-job pipeline per platform:
#   1. Sets up Go and compiles the build tool.
#   2. Runs planning mode (`--emit-plan`) to detect changed packages and determine
#      which language toolchains are needed.
#   3. Conditionally installs only the needed toolchains (e.g. Python, Ruby, Node).
#   4. Executes the build using the generated JSON plan.
#
# This saves time by avoiding artifact uploads/downloads and skipping
# unneeded toolchain installations (e.g., Rust tarpaulin, Elixir/Erlang).

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Job 1: Detect which languages need toolchains ────────────
  #
  # This job is fast (~10s). It compiles the Go build tool, runs
  # --detect-languages, and outputs boolean flags for each language.
  # The build job reads these flags to conditionally install toolchains.
  detect:
    runs-on: ubuntu-latest
    outputs:
      needs_python: ${{ steps.toolchains.outputs.needs_python }}
      needs_ruby: ${{ steps.toolchains.outputs.needs_ruby }}
      needs_go: ${{ steps.toolchains.outputs.needs_go }}
      needs_typescript: ${{ steps.toolchains.outputs.needs_typescript }}
      needs_rust: ${{ steps.toolchains.outputs.needs_rust }}
      needs_elixir: ${{ steps.toolchains.outputs.needs_elixir }}
      needs_lua: ${{ steps.toolchains.outputs.needs_lua }}
      needs_perl: ${{ steps.toolchains.outputs.needs_perl }}
      needs_dart: ${{ steps.toolchains.outputs.needs_dart }}
      needs_swift: ${{ steps.toolchains.outputs.needs_swift }}
      needs_haskell: ${{ steps.toolchains.outputs.needs_haskell }}
      needs_kotlin: ${{ steps.toolchains.outputs.needs_kotlin }}
      needs_dotnet: ${{ steps.toolchains.outputs.needs_dotnet }}
      diff_base: ${{ steps.diff-base.outputs.base }}
      is_main: ${{ steps.detect-main.outputs.is_main }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Determine diff base
        id: diff-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            BASE="HEAD~1"
          else
            git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
            BASE="origin/main"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Diff base: $BASE"

      - name: Check if main branch
        id: detect-main
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build plan
        id: plan
        run: |
          cd code/programs/go/build-tool
          go build -o ../../../../build-tool .
          cd ../../../..
          ./build-tool \
            -root . \
            -diff-base "${{ steps.diff-base.outputs.base }}" \
            -validate-build-files \
            -detect-languages \
            -emit-plan build-plan.json

      - name: Normalize toolchain requirements
        id: toolchains
        shell: bash
        run: |
          if [ "${{ steps.detect-main.outputs.is_main }}" = "true" ]; then
            echo "Main branch push detected; enabling all supported toolchains for the forced full build"
            printf '%s\n' \
              'needs_python=true' \
              'needs_ruby=true' \
              'needs_go=true' \
              'needs_typescript=true' \
              'needs_rust=true' \
              'needs_elixir=true' \
              'needs_lua=true' \
              'needs_perl=true' \
              'needs_dart=true' \
              'needs_swift=true' \
              'needs_haskell=true' \
              'needs_kotlin=true' \
              'needs_dotnet=true' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' \
              "needs_python=${{ steps.plan.outputs.needs_python }}" \
              "needs_ruby=${{ steps.plan.outputs.needs_ruby }}" \
              "needs_go=${{ steps.plan.outputs.needs_go }}" \
              "needs_typescript=${{ steps.plan.outputs.needs_typescript }}" \
              "needs_rust=${{ steps.plan.outputs.needs_rust }}" \
              "needs_elixir=${{ steps.plan.outputs.needs_elixir }}" \
              "needs_lua=${{ steps.plan.outputs.needs_lua }}" \
              "needs_perl=${{ steps.plan.outputs.needs_perl }}" \
              "needs_dart=${{ steps.plan.outputs.needs_dart }}" \
              "needs_swift=${{ steps.plan.outputs.needs_swift }}" \
              "needs_haskell=${{ steps.plan.outputs.needs_haskell }}" \
              "needs_kotlin=${{ steps.plan.outputs.needs_kotlin }}" \
              "needs_dotnet=${{ steps.plan.outputs.needs_dotnet }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Language toolchains (conditional) ───────────────────────
      
      - name: Set up Python
        if: steps.toolchains.outputs.needs_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          allow-prereleases: true

      - name: Install uv
        if: steps.toolchains.outputs.needs_python == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.x"

      # ── Lua must be set up BEFORE Ruby on Windows ──────────────
      #
      # Ruby's MSYS2 ships its own `link.exe` which shadows the MSVC
      # linker that Lua needs to compile. By installing MSVC + Lua
      # first, the MSVC `link.exe` is in PATH before Ruby's MSYS2.

      - name: Set up MSVC (required for Lua on Windows)
        if: (steps.toolchains.outputs.needs_lua == 'true' || steps.detect-main.outputs.is_main == 'true') && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Lua
        if: steps.toolchains.outputs.needs_lua == 'true' || steps.detect-main.outputs.is_main == 'true'
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks (Unix)
        if: (steps.toolchains.outputs.needs_lua == 'true' || steps.detect-main.outputs.is_main == 'true') && runner.os != 'Windows'
        uses: leafo/gh-actions-luarocks@v4

      - name: Set up LuaRocks (Windows)
        if: (steps.toolchains.outputs.needs_lua == 'true' || steps.detect-main.outputs.is_main == 'true') && runner.os == 'Windows'
        shell: cmd
        run: |
          curl -L -o luarocks.zip https://luarocks.github.io/luarocks/releases/luarocks-3.11.1-windows-64.zip
          powershell -Command "Expand-Archive -Path luarocks.zip -DestinationPath luarocks-install"
          cd luarocks-install\luarocks-3.11.1-windows-64
          echo %CD%>> %GITHUB_PATH%

      - name: Install Lua test tools (Unix)
        if: (steps.toolchains.outputs.needs_lua == 'true' || steps.detect-main.outputs.is_main == 'true') && runner.os != 'Windows'
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          curl -L --fail https://luarocks.org/manifests/hoelzro/lua-term-0.8-1.rockspec -o "$tmpdir/lua-term-0.8-1.rockspec"
          sed -i.bak 's|archive/0\.08\.tar\.gz|archive/refs/tags/0.08.tar.gz|' "$tmpdir/lua-term-0.8-1.rockspec"
          luarocks install "$tmpdir/lua-term-0.8-1.rockspec"
          rm -rf "$tmpdir"
          luarocks install busted
          luarocks install luacov
          luarocks install luacheck
          luarocks install luasocket 2>/dev/null || true

      - name: Install Lua test tools (Windows)
        if: (steps.toolchains.outputs.needs_lua == 'true' || steps.detect-main.outputs.is_main == 'true') && runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          luarocks install busted
          luarocks install luacov
          luarocks install luacheck
          for /f "delims=" %%i in ('luarocks path --lr-bin') do echo %%i>> %GITHUB_PATH%

      - name: Set up Ruby
        if: steps.toolchains.outputs.needs_ruby == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - name: Install bundler
        if: steps.toolchains.outputs.needs_ruby == 'true'
        run: gem install bundler

      - name: Set up Node.js
        if: steps.toolchains.outputs.needs_typescript == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        if: steps.toolchains.outputs.needs_rust == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        if: steps.toolchains.outputs.needs_rust == 'true' && runner.os == 'Linux'
        run: cargo install cargo-tarpaulin

      - name: Set up Elixir
        if: steps.toolchains.outputs.needs_elixir == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26.0'

      - name: Set up Dart
        if: steps.toolchains.outputs.needs_dart == 'true'
        uses: dart-lang/setup-dart@v1

      - name: Set up Perl
        if: steps.toolchains.outputs.needs_perl == 'true'
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'

      - name: Install Perl test deps
        if: steps.toolchains.outputs.needs_perl == 'true'
        shell: bash
        run: cpanm --quiet --notest Test2::Suite

      - name: Install test runners
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y cpanminus
            # Pre-install Test2::V0 to the system Perl location (requires sudo).
            # Without sudo, cpanm falls back to ~/perl5 which prove cannot find.
            sudo cpanm --quiet --notest Test2::V0
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cpanminus
            cpanm --quiet --notest Test2::V0
          fi

      - name: Set up Haskell
        if: steps.toolchains.outputs.needs_haskell == 'true'
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4'
          cabal-version: '3.10'

      - name: Set up .NET
        if: steps.toolchains.outputs.needs_dotnet == 'true'
        uses: actions/setup-dotnet@v4
        with:
          # .NET 9 is the current LTS release. No platform exclusions needed —
          # actions/setup-dotnet@v4 works identically on Ubuntu, macOS, and Windows.
          dotnet-version: '9.0.x'

      - name: Install cpanm and test dependencies (Perl)
        if: steps.toolchains.outputs.needs_perl == 'true' && runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y cpanminus
            sudo cpanm --quiet --notest Test2::V0
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cpanminus
            cpanm --quiet --notest Test2::V0
          fi

      - name: Install test runners
        run: |
          if [ "${{ steps.toolchains.outputs.needs_python }}" = "true" ]; then
            uv pip install --system pytest
          fi
          if [ "${{ steps.toolchains.outputs.needs_typescript }}" = "true" ]; then
            npm install -g jest
          fi

      # ── Verify toolchains ────────────────────────────────────
      - name: Verify tools
        run: |
          echo "Go: $(go version)"
          if [ "${{ steps.toolchains.outputs.needs_python }}" = "true" ]; then
            echo "Python: $(python --version)"
            echo "uv: $(uv --version)"
          fi
          if [ "${{ steps.toolchains.outputs.needs_ruby }}" = "true" ]; then
            echo "Ruby: $(ruby --version)"
            echo "Bundler: $(bundle --version)"
          fi
          if [ "${{ steps.toolchains.outputs.needs_typescript }}" = "true" ]; then
            echo "Node: $(node --version)"
            echo "npm: $(npm --version)"
          fi
          if [ "${{ steps.toolchains.outputs.needs_rust }}" = "true" ]; then
            echo "Rust: $(rustc --version)"
            echo "Cargo: $(cargo --version)"
          fi
          if [ "${{ steps.toolchains.outputs.needs_elixir }}" = "true" ]; then
            echo "Elixir: $(elixir --version)"
            echo "Mix: $(mix --version)"
          fi
          if [ "${{ steps.toolchains.outputs.needs_perl }}" = "true" ]; then
            echo "Perl: $(perl --version | head -2)"
          fi

      # ── Download build plan (skip discovery in build job) ─────
      - name: Download build plan
        uses: actions/download-artifact@v4
        with:
          name: build-plan
        continue-on-error: true

      # ── Kotlin (JDK 21 + Gradle) ─────────────────────────────
      #
      # Kotlin packages use Gradle as their build system and target JVM 21.
      - name: Set up JDK 21
        if: steps.toolchains.outputs.needs_kotlin == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        if: steps.toolchains.outputs.needs_kotlin == 'true'
        uses: gradle/actions/setup-gradle@v4

      # ── Build the build tool ──────────────────────────────────
      - name: Pin MSVC linker for Rust (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vsInstall = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $msvcVer = Get-ChildItem "$vsInstall\VC\Tools\MSVC" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          $linkExe = "$($msvcVer.FullName)\bin\HostX64\x64\link.exe"
          if (-not (Test-Path $linkExe)) { Write-Error "MSVC link.exe not found: $linkExe"; exit 1 }
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linkExe" >> $env:GITHUB_ENV
          Write-Host "Pinned Rust MSVC linker to: $linkExe"

      - name: Compile build tool
        shell: bash
        run: |
          cd code/programs/go/build-tool
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -o ../../../../build-tool.exe .
          else
            go build -o ../../../../build-tool .
          fi
          cd ../../../..

      - name: Build and test affected Swift packages on Windows
        if: runner.os == 'Windows' && steps.toolchains.outputs.needs_swift == 'true'
        shell: pwsh
        run: |
          $planFlag = @()
          if (Test-Path 'build-plan.json') {
            Write-Host 'Using pre-computed build plan'
            $planFlag = @('-plan-file', 'build-plan.json')
          }
          & ./build-tool.exe -root . @planFlag -validate-build-files -language swift

      # ── Run the build ─────────────────────────────────────────
      - name: Build and test affected packages
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          PLAN_FLAG=""
          if [ -f build-plan.json ]; then
            PLAN_FLAG="-plan-file build-plan.json"
            echo "Using pre-computed build plan"
          fi
          $BT \
            -root . \
            $PLAN_FLAG \
            -validate-build-files \
            -language all

      # ── Force full build on main ──────────────────────────────
      - name: Full build on main merge
        if: steps.detect-main.outputs.is_main == 'true'
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          $BT -root . -force -validate-build-files -language all
