[project]
name = "coding-adventures-compute-runtime"
version = "0.1.0"
description = "Low-level Vulkan-inspired compute runtime — Layer 5 of the accelerator computing stack"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adhithya Rajasekaran" }]
keywords = [
    "gpu",
    "vulkan",
    "cuda",
    "metal",
    "compute-runtime",
    "command-buffer",
    "synchronization",
    "simulator",
    "computer-science",
    "education",
]

dependencies = [
    "coding-adventures-device-simulator",
    "coding-adventures-compute-unit",
    "coding-adventures-gpu-core",
    "coding-adventures-parallel-execution-engine",
    "coding-adventures-fp-arithmetic",
    "coding-adventures-clock",
    "coding-adventures-logic-gates",
    "coding-adventures-arithmetic",
    "coding-adventures-cache",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "ruff>=0.4.0",
    "mypy>=1.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/compute_runtime"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.12"
strict = true
