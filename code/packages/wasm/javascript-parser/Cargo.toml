[workspace]

[package]
name = "javascript-parser-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust JavaScript parser"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
grammar_wasm_support = { package = "grammar-wasm-support", path = "../../rust/grammar-wasm-support" }
language_lexer = { package = "coding-adventures-javascript-lexer", path = "../../rust/javascript-lexer" }
language_parser = { package = "coding-adventures-javascript-parser", path = "../../rust/javascript-parser" }
wasm-bindgen = "0.2"
