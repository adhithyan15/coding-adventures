[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-nib-compiler"
version = "0.1.0"
description = "End-to-end Nib compiler: Nib source to Intel HEX ROM image"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-compiler-ir",
    "coding-adventures-ir-optimizer",
    "coding-adventures-parser",
    "coding-adventures-nib-parser",
    "coding-adventures-nib-type-checker",
    "coding-adventures-nib-ir-compiler",
    "coding-adventures-ir-to-intel-4004-compiler",
    "coding-adventures-intel-4004-assembler",
    "coding-adventures-intel-4004-packager",
]

[tool.uv.sources]
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-ir-optimizer = { path = "../ir-optimizer", editable = true }
coding-adventures-parser = { path = "../parser", editable = true }
coding-adventures-nib-parser = { path = "../nib-parser", editable = true }
coding-adventures-nib-type-checker = { path = "../nib-type-checker", editable = true }
coding-adventures-nib-ir-compiler = { path = "../nib-ir-compiler", editable = true }
coding-adventures-ir-to-intel-4004-compiler = { path = "../ir-to-intel-4004-compiler", editable = true }
coding-adventures-intel-4004-assembler = { path = "../intel-4004-assembler", editable = true }
coding-adventures-intel-4004-packager = { path = "../intel-4004-packager", editable = true }
coding-adventures-intel4004-simulator = { path = "../intel4004-simulator", editable = true }

[project.optional-dependencies]
dev = [
    "coding-adventures-intel4004-simulator",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nib_compiler"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=nib_compiler --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/nib_compiler"]

[tool.coverage.report]
fail_under = 80
show_missing = true
