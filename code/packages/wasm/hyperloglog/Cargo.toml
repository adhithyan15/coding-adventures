[workspace]

[package]
name = "hyperloglog-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust HyperLogLog crate via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
hyperloglog = { path = "../../rust/hyperloglog" }
wasm-bindgen = "0.2"
