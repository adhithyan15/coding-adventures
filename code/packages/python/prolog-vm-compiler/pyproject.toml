[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-prolog-vm-compiler"
version = "0.1.0"
description = "Compiler that lowers loaded Prolog sources into Logic VM instruction streams"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-cli-builder>=0.1.0",
    "coding-adventures-iso-prolog-parser>=0.1.0",
    "coding-adventures-logic-bytecode>=0.1.0",
    "coding-adventures-logic-bytecode-vm>=0.1.0",
    "coding-adventures-logic-engine>=0.10.0",
    "coding-adventures-logic-instructions>=0.2.0",
    "coding-adventures-logic-vm>=0.2.0",
    "coding-adventures-prolog-loader>=0.1.0",
    "coding-adventures-prolog-parser>=0.1.0",
    "coding-adventures-swi-prolog-parser>=0.1.0",
    "coding-adventures-symbol-core>=0.1.0",
]
keywords = ["prolog", "logic-programming", "virtual-machine", "compiler"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/PR17-prolog-vm-compiler.md"

[project.scripts]
prolog-vm = "prolog_vm_compiler.cli:main"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.uv.sources]
coding-adventures-cli-builder = { path = "../cli-builder", editable = true }
coding-adventures-logic-bytecode = { path = "../logic-bytecode", editable = true }
coding-adventures-logic-bytecode-vm = { path = "../logic-bytecode-vm", editable = true }
coding-adventures-logic-engine = { path = "../logic-engine", editable = true }
coding-adventures-logic-instructions = { path = "../logic-instructions", editable = true }
coding-adventures-logic-vm = { path = "../logic-vm", editable = true }
coding-adventures-iso-prolog-parser = { path = "../iso-prolog-parser", editable = true }
coding-adventures-prolog-loader = { path = "../prolog-loader", editable = true }
coding-adventures-prolog-parser = { path = "../prolog-parser", editable = true }
coding-adventures-swi-prolog-parser = { path = "../swi-prolog-parser", editable = true }
coding-adventures-symbol-core = { path = "../symbol-core", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/prolog_vm_compiler"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=prolog_vm_compiler --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/prolog_vm_compiler"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.mypy]
ignore_missing_imports = true
