[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-device-simulator"
version = "0.1.0"
description = "Accelerator device simulators — NVIDIA GPU, AMD GPU, Google TPU, Intel GPU, and Apple ANE"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["gpu", "tpu", "npu", "device-simulator", "accelerator", "computer-science", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "coding-adventures-compute-unit",
    "coding-adventures-cache",
    "coding-adventures-parallel-execution-engine",
    "coding-adventures-gpu-core",
    "coding-adventures-fp-arithmetic",
    "coding-adventures-clock",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/G04-device-simulator.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/device_simulator"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
    "ANN",  # type annotation enforcement
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=device_simulator --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/device_simulator"]

[tool.coverage.report]
fail_under = 90
show_missing = true
