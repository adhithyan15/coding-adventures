[workspace]

[package]
name = "mini-redis-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for in-memory-data-store / mini-redis via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
in-memory-data-store = { path = "../../rust/in-memory-data-store" }
resp-protocol = { path = "../../rust/resp-protocol" }
