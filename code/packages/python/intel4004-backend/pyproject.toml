[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-intel4004-backend"
version = "0.1.0"
description = "Intel 4004 BackendProtocol implementation for the LANG pipeline (jit-core / aot-core)"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["intel-4004", "backend", "jit", "aot", "lang", "interpreter-ir"]
dependencies = [
    "coding-adventures-jit-core",
    "coding-adventures-intel4004-simulator",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Software Development :: Compilers",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/intel4004_backend"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=intel4004_backend --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/intel4004_backend"]

[tool.coverage.report]
fail_under = 80
show_missing = true
