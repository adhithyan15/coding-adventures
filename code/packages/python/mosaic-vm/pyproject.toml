[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-mosaic-vm"
version = "0.1.0"
description = "Generic tree walker that drives Mosaic compiler backends"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-directed-graph",
    "coding-adventures-grammar-tools",
    "coding-adventures-lexer",
    "coding-adventures-mosaic-analyzer",
    "coding-adventures-mosaic-lexer",
    "coding-adventures-mosaic-parser",
    "coding-adventures-parser",
    "coding-adventures-state-machine",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/mosaic_vm"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=mosaic_vm --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/mosaic_vm"]

[tool.coverage.report]
fail_under = 80
show_missing = true
