[package]
name = "bitset-native"
version = "0.1.0"
edition = "2021"
description = "Python native extension wrapping the Rust bitset crate via python-bridge (zero third-party deps)"

[lib]
name = "bitset_native"
crate-type = ["cdylib"]

[dependencies]
# Our own zero-dependency Python C API bridge — replaces PyO3.
python-bridge = { path = "../../rust/python-bridge" }

# The core bitset crate — all bit manipulation logic lives here.
bitset = { path = "../../rust/bitset" }

# This crate is NOT part of the Rust workspace (it produces a cdylib
# for Python, not a normal Rust library).
[workspace]
