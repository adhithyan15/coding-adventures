[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-mos6502-simulator"
version = "0.1.0"
description = "MOS 6502 behavioral simulator — Layer 07j"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "coding-adventures-simulator-protocol",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mos6502_simulator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "--cov=mos6502_simulator",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "SIM", "B", "C4"]
ignore = ["E501"]
