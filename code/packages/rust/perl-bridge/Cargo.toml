# Zero dependencies. We declare Perl's C API functions ourselves using
# extern "C" — no perlxs, no Inline::C, no build-time header requirement.
# These function signatures have been stable since Perl 5.8 (2002).
[package]
name = "perl-bridge"
version = "0.1.0"
edition = "2021"
description = "Thin safe Rust wrapper over Perl's C API — zero dependencies, no XS toolchain, no macros"

[dependencies]
