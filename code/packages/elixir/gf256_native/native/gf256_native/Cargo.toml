# Compiles to a cdylib (C-compatible dynamic library) loaded by Erlang's NIF system.
[workspace]

[package]
name = "gf256-native-nif"
version = "0.1.0"
edition = "2021"
description = "Erlang NIF exposing GF(256) field arithmetic from Rust to Elixir"
build = "build.rs"

[lib]
name = "gf256_native"
crate-type = ["cdylib"]

[dependencies]
erl-nif-bridge = { path = "../../../../rust/erl-nif-bridge" }
gf256 = { path = "../../../../rust/gf256" }
