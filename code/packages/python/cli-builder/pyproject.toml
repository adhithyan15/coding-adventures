[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-cli-builder"
version = "0.1.0"
description = "Declarative CLI argument parsing via directed graphs and state machines"
requires-python = ">=3.12"
dependencies = [
    "coding-adventures-directed-graph",
    "coding-adventures-state-machine",
]
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["cli", "argument-parsing", "directed-graph", "state-machine", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/cli-builder-spec.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/cli_builder"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
    "ANN",  # type annotation enforcement
]
ignore = [
    "ANN401",  # Allow 'Any' as a type annotation (used extensively in parsed spec dicts)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=cli_builder --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/cli_builder"]

[tool.coverage.report]
fail_under = 80
show_missing = true
