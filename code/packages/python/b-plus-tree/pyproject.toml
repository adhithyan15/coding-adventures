[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-b-plus-tree"
version = "0.1.0"
description = "B+ tree: all data in leaves with a sorted linked list of leaves for efficient range scans"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/b_plus_tree"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=b_plus_tree --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/b_plus_tree"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]
ignore = []
