[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "coding-adventures-directed-graph-native"
version = "0.1.0"
description = "Rust-backed directed graph for Python — native extension via python-bridge (zero deps)"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "maturin>=1.0"]

[tool.maturin]
# The Python module name must match the Rust lib name in Cargo.toml.
module-name = "directed_graph_native"
# Tell maturin this is a raw cdylib with its own PyInit_ function —
# not a PyO3 or cffi project. Without this, maturin auto-detects
# "cffi" mode and tries to install the cffi package.
bindings = "pyo3"

[tool.pytest.ini_options]
testpaths = ["tests"]
