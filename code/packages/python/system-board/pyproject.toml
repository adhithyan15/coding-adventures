[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-system-board"
version = "0.1.0"
description = "S06 System Board -- complete simulated computer from power-on to Hello World"
requires-python = ">=3.12"
dependencies = [
    "coding-adventures-bootloader",
    "coding-adventures-display",
    "coding-adventures-interrupt-handler",
    "coding-adventures-os-kernel",
    "coding-adventures-riscv-simulator",
    "coding-adventures-rom-bios",
]
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["system-board", "boot", "computer", "riscv", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10", "coding-adventures-arithmetic", "coding-adventures-bootloader", "coding-adventures-branch-predictor", "coding-adventures-cache", "coding-adventures-clock", "coding-adventures-core", "coding-adventures-cpu-pipeline", "coding-adventures-cpu-simulator", "coding-adventures-directed-graph", "coding-adventures-display", "coding-adventures-hazard-detection", "coding-adventures-interrupt-handler", "coding-adventures-logic-gates", "coding-adventures-os-kernel", "coding-adventures-riscv-simulator", "coding-adventures-rom-bios", "coding-adventures-state-machine"]

[tool.hatch.build.targets.wheel]
packages = ["src/system_board"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=system_board --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/system_board"]

[tool.coverage.report]
fail_under = 80
show_missing = true
