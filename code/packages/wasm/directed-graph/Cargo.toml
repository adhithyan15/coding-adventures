[workspace]

[package]
name = "directed-graph-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust directed-graph crate via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
directed-graph = { path = "../../rust/directed-graph" }
serde_json = "1"
wasm-bindgen = "0.2"
