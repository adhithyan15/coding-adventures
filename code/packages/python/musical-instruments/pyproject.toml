[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-musical-instruments"
version = "0.1.0"
description = "Naive musical instrument profiles and additive note rendering"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-note-frequency>=0.1.0",
    "coding-adventures-oscillator>=0.1.0",
    "coding-adventures-pcm-audio>=0.1.0",
    "coding-adventures-trig>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.uv.sources]
coding-adventures-note-frequency = { path = "../note-frequency", editable = true }
coding-adventures-oscillator = { path = "../oscillator", editable = true }
coding-adventures-pcm-audio = { path = "../pcm-audio", editable = true }
coding-adventures-trig = { path = "../trig", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/musical_instruments"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=musical_instruments --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/musical_instruments"]

[tool.coverage.report]
fail_under = 95
show_missing = true
