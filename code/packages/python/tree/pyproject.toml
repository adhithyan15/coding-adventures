[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-tree"
version = "0.1.0"
description = "Rooted tree data structure backed by a directed graph — traversals, LCA, subtree extraction, ASCII visualization"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
# Runtime dependency: coding-adventures-directed-graph
# Declared via BUILD file's -e ../directed-graph for local development and CI.
# When publishing to PyPI, restore: dependencies = ["coding-adventures-directed-graph"]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/tree"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=tree --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/tree"]
