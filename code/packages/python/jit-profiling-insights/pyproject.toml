[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-jit-profiling-insights"
version = "0.1.0"
description = "Developer feedback from the JIT compiler: visibility into guards, generic dispatch, and deoptimisations — with actionable type annotation suggestions."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "coding-adventures-interpreter-ir",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "ruff",
]

[tool.hatch.build.targets.wheel]
packages = ["src/jit_profiling_insights"]

[tool.ruff]
line-length = 100
target-version = "py311"
