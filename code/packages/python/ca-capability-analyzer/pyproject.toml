[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ca-capability-analyzer"
version = "0.1.0"
description = "Static analyzer that detects OS-level capability usage in Python source code by walking the AST"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["security", "capabilities", "static-analysis", "supply-chain"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Security",
    "Topic :: Software Development :: Quality Assurance",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/13-capability-security.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[project.scripts]
ca-capability-analyzer = "ca_capability_analyzer.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ca_capability_analyzer"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
    "ANN",  # type annotation enforcement
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=ca_capability_analyzer --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/ca_capability_analyzer"]

[tool.coverage.report]
fail_under = 80
show_missing = true
