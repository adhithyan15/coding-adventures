[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-hyperloglog"
version = "0.1.0"
description = "HyperLogLog approximate cardinality estimation — DT21"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
dependencies = ["coding-adventures-hash-functions"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/hyperloglog"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=hyperloglog --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/hyperloglog"]
