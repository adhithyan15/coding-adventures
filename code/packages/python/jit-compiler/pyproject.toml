[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-jit-compiler"
version = "0.1.0"
description = "JIT compiler that compiles hot bytecode paths to native machine code at runtime (shell — not yet implemented)"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["jit", "compiler", "native-code", "optimization"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "coding-adventures-virtual-machine",
    "coding-adventures-assembler",
]

[project.optional-dependencies]
dev = [
    "coding-adventures-arithmetic",
    "coding-adventures-arm-simulator",
    "coding-adventures-cpu-simulator",
    "coding-adventures-logic-gates",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/05b-jit-compiler.md"

[tool.hatch.build.targets.wheel]
packages = ["src/jit_compiler"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
