[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-logic-stdlib"
version = "0.4.0"
description = "Relational standard library helpers, combinators, and sequence relations built on top of logic-engine"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = ["coding-adventures-logic-engine>=0.3.0"]
keywords = ["logic-programming", "prolog", "kanren", "relations", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/LP06-sequence-relations.md"

[project.optional-dependencies]
dev = [
    "coding-adventures-logic-core>=0.2.0",
    "coding-adventures-symbol-core>=0.1.0",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.uv.sources]
coding-adventures-logic-engine = { path = "../logic-engine", editable = true }
coding-adventures-logic-core = { path = "../logic-core", editable = true }
coding-adventures-symbol-core = { path = "../symbol-core", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/logic_stdlib"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=logic_stdlib --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/logic_stdlib"]

[tool.coverage.report]
fail_under = 80
show_missing = true
