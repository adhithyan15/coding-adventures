[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-neural-graph-vm"
version = "0.1.0"
description = "Reference neural graph bytecode compiler and scalar interpreter"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = ["coding-adventures-neural-network"]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/neural_graph_vm"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "../neural-network/src"]
