# Electron Release — Journal App
#
# Builds the Journal desktop app for macOS, Windows, and Linux,
# then attaches the installers to a GitHub Release.
#
# Triggered by pushing a tag matching `journal-v*`:
#   git tag journal-v0.1.0
#   git push origin journal-v0.1.0
#
# The workflow:
#   1. Builds on macOS, Ubuntu, and Windows runners in parallel
#   2. Uploads build artifacts per platform
#   3. A single "release" job collects all artifacts and creates one GitHub Release

name: Release Journal

on:
  push:
    tags:
      - "journal-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install local package dependencies
        shell: bash
        run: |
          cd code/packages/typescript/directed-graph && npm install
          cd ../grammar-tools && npm install
          cd ../lexer && npm install
          cd ../state-machine && npm install
          cd ../parser && npm install
          cd ../document-ast && npm install
          cd ../document-ast-to-html && npm install
          cd ../document-ast-sanitizer && npm install
          cd ../gfm-parser && npm install
          cd ../gfm && npm install
          cd ../sql-lexer && npm install
          cd ../sql-parser && npm install
          cd ../sql-execution-engine && npm install
          cd ../storage && npm install
          cd ../indexeddb && npm install
          cd ../store && npm install
          cd ../ui-components && npm install
          cd ../../../programs/typescript/journal-app && npm install

      - name: Build renderer (Vite) + main process (tsc)
        working-directory: code/programs/typescript/journal-app
        shell: bash
        run: |
          npm run build
          npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        working-directory: code/programs/typescript/journal-app
        shell: bash
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            code/programs/typescript/journal-app/release/*.AppImage
            code/programs/typescript/journal-app/release/*.dmg
            code/programs/typescript/journal-app/release/*.dmg.blockmap
            code/programs/typescript/journal-app/release/*.zip
            code/programs/typescript/journal-app/release/*.zip.blockmap
            code/programs/typescript/journal-app/release/*.exe
            code/programs/typescript/journal-app/release/*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
