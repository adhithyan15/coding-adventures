[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-hash-functions"
version = "0.1.0"
description = "Pure implementations of FNV-1a, DJB2, polynomial rolling, and MurmurHash3 — the non-cryptographic hash functions powering hash tables, Bloom filters, and HyperLogLog"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/hash_functions"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=hash_functions --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/hash_functions"]

[tool.coverage.report]
fail_under = 95
show_missing = true

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = ["ANN101", "ANN102"]
