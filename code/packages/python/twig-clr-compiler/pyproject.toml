[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-twig-clr-compiler"
version = "0.1.0"
description = "Twig → CLR (CIL bytecode + PE assembly) — first non-Python target for Twig"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["twig", "lisp", "clr", "cil", "dotnet", "compiler", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Software Development :: Compilers",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "coding-adventures-twig",
    "coding-adventures-compiler-ir",
    "coding-adventures-ir-optimizer",
    "coding-adventures-cil-bytecode-builder",
    "coding-adventures-cli-runtime-model",
    "coding-adventures-clr-bytecode-disassembler",
    "coding-adventures-clr-pe-file",
    "coding-adventures-ir-to-cil-bytecode",
    "coding-adventures-cli-assembly-writer",
    "coding-adventures-clr-vm-simulator",
]

[tool.uv.sources]
coding-adventures-twig = { path = "../twig", editable = true }
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-ir-optimizer = { path = "../ir-optimizer", editable = true }
coding-adventures-cil-bytecode-builder = { path = "../cil-bytecode-builder", editable = true }
coding-adventures-cli-runtime-model = { path = "../cli-runtime-model", editable = true }
coding-adventures-clr-bytecode-disassembler = { path = "../clr-bytecode-disassembler", editable = true }
coding-adventures-clr-pe-file = { path = "../clr-pe-file", editable = true }
coding-adventures-ir-to-cil-bytecode = { path = "../ir-to-cil-bytecode", editable = true }
coding-adventures-cli-assembly-writer = { path = "../cli-assembly-writer", editable = true }
coding-adventures-clr-vm-simulator = { path = "../clr-vm-simulator", editable = true }

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=twig_clr_compiler --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/twig_clr_compiler"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.hatch.build.targets.wheel]
packages = ["src/twig_clr_compiler"]
