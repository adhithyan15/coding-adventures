name: Build Swift Apps

# Run on every push and pull request that touches a Swift app.
on:
  push:
    paths:
      - 'code/programs/swift/**'
      - '.github/workflows/build-swift.yml'
  pull_request:
    paths:
      - 'code/programs/swift/**'
      - '.github/workflows/build-swift.yml'

jobs:
  build-hello-world:
    name: Hello World
    # macos-15 is the latest GitHub-hosted macOS runner (Apple Silicon).
    # It ships with Xcode 16.x. When Xcode 26 runners become available
    # on GitHub Actions, update this to macos-16.
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # Pin to the Xcode version available on this runner.
        # Run `ls /Applications/Xcode*` on the runner to see what's installed.
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: code/programs/swift/01-hello-world
        run: xcodegen generate

      - name: Build iOS app
        working-directory: code/programs/swift/01-hello-world
        run: |
          xcodebuild build \
            -scheme HelloWorld \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Build watchOS app
        # Use generic/platform to avoid needing a watchOS runtime installed.
        # The runner has Xcode but watchOS simulator runtimes are not
        # pre-installed. generic/platform compiles and links without
        # booting a simulator, which is all we need for a build check.
        working-directory: code/programs/swift/01-hello-world
        run: |
          xcodebuild build \
            -scheme HelloWorldWatch \
            -destination 'generic/platform=watchOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

  build-06-notifications:
    name: "06 — Notifications"
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: code/programs/swift/06-notifications
        run: xcodegen generate

      - name: Build iOS app
        working-directory: code/programs/swift/06-notifications
        run: |
          xcodebuild build \
            -scheme WaterNotify \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Create iOS test simulator
        # macos-15 runners do not pre-create simulator devices — only the runtime
        # is bundled with Xcode. We discover the available runtime dynamically
        # (never hard-code the version — runner images vary) then create a device.
        run: |
          # Find the first available iOS runtime bundled with this Xcode install.
          RUNTIME=$(xcrun simctl list runtimes -j \
            | python3 -c "
          import json, sys
          rts = [r for r in json.load(sys.stdin)['runtimes']
                 if 'iOS' in r['name'] and r.get('isAvailable', False)]
          print(rts[-1]['identifier'] if rts else '')
          ")
          if [ -z "$RUNTIME" ]; then
            echo '##[error] No available iOS runtime found. All runtimes:'
            xcrun simctl list runtimes
            exit 1
          fi
          echo "Using runtime: $RUNTIME"

          # Find the latest iPhone device type available.
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j \
            | python3 -c "
          import json, sys
          types = [d['identifier'] for d in json.load(sys.stdin)['devicetypes']
                   if 'iPhone' in d['name']]
          print(types[-1] if types else '')
          ")
          echo "Using device type: $DEVICE_TYPE"

          xcrun simctl create "CI_iPhone" "$DEVICE_TYPE" "$RUNTIME"
          xcrun simctl list devices | grep CI_iPhone

      - name: Run unit tests
        # Tests use MockNotificationCenter so no real UNUserNotificationCenter
        # is needed — they run cleanly in a booted simulator.
        working-directory: code/programs/swift/06-notifications
        run: |
          xcodebuild test \
            -scheme WaterNotifyTests \
            -destination 'platform=iOS Simulator,name=CI_iPhone' \
            CODE_SIGNING_ALLOWED=NO
