# ================================================================
# CI — Incremental, parallel monorepo build
# ================================================================
#
# This workflow uses the Go build tool to build and test only the
# packages that changed. The Go binary is compiled from source on
# every run (~1-2 seconds) — no cached binary needed.
#
# Change detection: git diff against the base branch determines which
# files changed, maps them to packages, then uses the dependency graph
# to find all affected packages (changed + transitive dependents).
#
# Parallelism: independent packages run concurrently via goroutines.
# The build tool partitions packages into levels by topological depth —
# packages at the same level have no dependencies on each other.
#
# Tiered strategy:
# - Every push: Linux only (fast feedback)
# - PRs to main: Linux + macOS (thorough validation)

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        # Linux on every push; add macOS for PRs to main
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git diff

      # ── Language toolchains ───────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      # ── Build the build tool ──────────────────────────────────
      - name: Compile build tool
        run: |
          cd code/programs/go/build-tool
          go build -o ../../../../build-tool .
          echo "Build tool compiled successfully"

      # ── Determine diff base ───────────────────────────────────
      - name: Determine diff base
        id: diff-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          else
            # For pushes, diff against the previous commit
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      # ── Run the build ─────────────────────────────────────────
      - name: Build and test affected packages
        run: |
          ./build-tool \
            -root . \
            -diff-base "${{ steps.diff-base.outputs.base }}" \
            -language all
        env:
          # Ensure uv and bundle are available
          PATH: ${{ github.workspace }}:$PATH

      # ── Force full build on main ──────────────────────────────
      # When merging to main, do a full build to ensure everything passes
      - name: Full build on main merge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          ./build-tool -root . -force -language all
