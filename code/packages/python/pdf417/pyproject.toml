[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-pdf417"
version = "0.1.0"
description = "PDF417 stacked linear barcode encoder — ISO/IEC 15438:2015 compliant"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-barcode-2d",
    "coding-adventures-paint-instructions",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/pdf417"]

[tool.uv.sources]
coding-adventures-barcode-2d         = { path = "../barcode-2d", editable = true }
coding-adventures-paint-instructions = { path = "../paint-instructions", editable = true }

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = [
    "ANN401",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN201", "ANN001", "ANN202"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=pdf417 --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/pdf417"]

[tool.coverage.report]
fail_under = 90
show_missing = true
