[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-logic-instructions"
version = "0.2.0"
description = "Standardized instruction stream for static and dynamic logic programs and future VM backends"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-logic-engine>=0.8.0",
    "coding-adventures-symbol-core>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/LP07-logic-instructions.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.uv.sources]
coding-adventures-logic-engine = { path = "../logic-engine", editable = true }
coding-adventures-symbol-core = { path = "../symbol-core", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/logic_instructions"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=logic_instructions --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/logic_instructions"]

[tool.coverage.report]
fail_under = 80
show_missing = true
