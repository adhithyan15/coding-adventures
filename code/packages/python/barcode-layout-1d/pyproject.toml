[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-barcode-layout-1d"
version = "0.1.0"
description = "Pure 1D barcode layout that converts barcode runs into paint scenes"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = ["coding-adventures-paint-instructions"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/barcode_layout_1d"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=barcode_layout_1d --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/barcode_layout_1d"]

[tool.coverage.report]
fail_under = 80
show_missing = true
