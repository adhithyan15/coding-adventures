[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-alpha-axp-simulator"
version = "0.1.0"
description = "DEC Alpha AXP 21064 (1992) behavioral simulator — Layer 07s"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "coding-adventures-simulator-protocol",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_axp_simulator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=alpha_axp_simulator --cov-report=term-missing --cov-fail-under=80"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.uv.sources]
coding-adventures-simulator-protocol = { path = "../simulator-protocol" }
