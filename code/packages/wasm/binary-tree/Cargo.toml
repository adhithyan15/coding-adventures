[workspace]

[package]
name = "binary-tree-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust binary-tree crate via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
binary-tree = { path = "../../rust/binary-tree" }
wasm-bindgen = "0.2"
