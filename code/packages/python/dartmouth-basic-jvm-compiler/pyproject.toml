[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-dartmouth-basic-jvm-compiler"
version = "0.1.0"
description = "Dartmouth BASIC → JVM compiled pipeline: parser → IR compiler (ASCII) → JVM backend → JVM simulator"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "coding-adventures-dartmouth-basic-parser",
    "coding-adventures-dartmouth-basic-ir-compiler",
    "coding-adventures-ir-to-jvm-class-file",
    "coding-adventures-jvm-runtime",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/dartmouth_basic_jvm_compiler"]

[tool.pytest.ini_options]
addopts = "--cov=dartmouth_basic_jvm_compiler --cov-report=term-missing --cov-fail-under=90"
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]
