[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-graph"
version = "0.1.0"
description = "Undirected graph data structure from scratch"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_graph"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=coding_adventures_graph --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/coding_adventures_graph"]
