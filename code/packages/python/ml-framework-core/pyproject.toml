[project]
name = "coding-adventures-ml-framework-core"
version = "0.1.0"
description = "Shared tensor/autograd engine for PyTorch, TensorFlow, and Keras API layers"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Adhithya Rajasekaran" }]
keywords = [
    "tensor",
    "autograd",
    "machine-learning",
    "deep-learning",
    "automatic-differentiation",
    "neural-network",
    "gpu",
    "education",
]

dependencies = [
    "coding-adventures-blas-library",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ml_framework_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
