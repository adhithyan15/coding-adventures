[package]
name = "commonmark"
version = "0.1.0"
edition = "2021"
description = "CommonMark 0.31.2 Markdown pipeline — parse Markdown to HTML in one call"

[dependencies]
commonmark-parser = { path = "../commonmark-parser" }
document-ast-to-html = { path = "../document-ast-to-html" }
document-ast = { path = "../document-ast" }

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
