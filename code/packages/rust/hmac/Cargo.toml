[package]
name = "coding_adventures_hmac"
version = "0.1.0"
edition = "2021"
description = "HMAC (Hash-based Message Authentication Code) — RFC 2104 / FIPS 198-1 — implemented from scratch"

[dependencies]
coding_adventures_md5 = { path = "../md5" }
coding_adventures_sha1 = { path = "../sha1" }
coding_adventures_sha256 = { path = "../sha256" }
coding_adventures_sha512 = { path = "../sha512" }
# subtle provides guaranteed constant-time comparison primitives.
# A hand-rolled XOR accumulator in Rust is not sufficient: LLVM can and does
# optimize away "dead" loop iterations once the accumulator is provably
# non-zero in release builds. subtle::ConstantTimeEq prevents this via
# compiler barriers.
subtle = "2"
