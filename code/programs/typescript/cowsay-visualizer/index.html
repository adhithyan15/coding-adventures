<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cowsay Visualizer</title>
    <style>
      /* ------------------------------------------------------------------ */
      /* Reset & base                                                         */
      /* ------------------------------------------------------------------ */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;        /* slate-900 */
        color: #e2e8f0;             /* slate-200 */
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
        gap: 1.5rem;
      }

      /* ------------------------------------------------------------------ */
      /* Header                                                               */
      /* ------------------------------------------------------------------ */
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        color: #f1f5f9;             /* slate-100 */
      }
      h1 span { color: #38bdf8; }  /* sky-400 */

      /* ------------------------------------------------------------------ */
      /* Controls card                                                        */
      /* ------------------------------------------------------------------ */
      .controls {
        width: 100%;
        max-width: 640px;
        background: #1e293b;        /* slate-800 */
        border: 1px solid #334155;  /* slate-700 */
        border-radius: 12px;
        padding: 1.25rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      label {
        font-size: 0.8125rem;
        font-weight: 600;
        color: #94a3b8;             /* slate-400 */
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: block;
        margin-bottom: 0.375rem;
      }

      textarea {
        width: 100%;
        padding: 0.625rem 0.75rem;
        background: #0f172a;        /* slate-900 */
        border: 1px solid #334155;  /* slate-700 */
        border-radius: 8px;
        color: #e2e8f0;
        font-family: "Courier New", Courier, monospace;
        font-size: 0.9375rem;
        resize: vertical;
        min-height: 5rem;
        outline: none;
        transition: border-color 0.15s;
      }
      textarea:focus { border-color: #38bdf8; }

      /* Backend toggle — two pill buttons side by side */
      .backend-toggle {
        display: flex;
        gap: 0;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #334155;
        width: fit-content;
      }
      .backend-toggle label {
        margin: 0;
        text-transform: none;
        letter-spacing: normal;
      }
      .backend-toggle input[type="radio"] { display: none; }
      .backend-toggle .pill {
        padding: 0.45rem 1.1rem;
        font-size: 0.875rem;
        font-weight: 600;
        color: #94a3b8;
        background: #1e293b;
        cursor: pointer;
        transition: background 0.12s, color 0.12s;
        user-select: none;
      }
      .backend-toggle input[type="radio"]:checked + .pill {
        background: #38bdf8;        /* sky-400 */
        color: #0f172a;             /* slate-900 — dark text on bright bg */
      }
      .backend-toggle .pill:hover { color: #e2e8f0; }
      .backend-toggle input[type="radio"]:checked + .pill:hover { color: #0f172a; }

      .row {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }
      .field { flex: 1; }

      /* ------------------------------------------------------------------ */
      /* Output area                                                          */
      /* ------------------------------------------------------------------ */
      .output-wrap {
        width: 100%;
        max-width: 900px;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 200px;
      }

      #output {
        display: inline-block;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 4px 24px rgba(0,0,0,0.45);
      }
      /* SVG injected via innerHTML should not overflow */
      #output svg { display: block; }

      /* ------------------------------------------------------------------ */
      /* Footer                                                               */
      /* ------------------------------------------------------------------ */
      footer {
        font-size: 0.75rem;
        color: #475569;             /* slate-600 */
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>🐄 <span>Cowsay</span> Visualizer</h1>

    <div class="controls">
      <!-- Message input -->
      <div>
        <label for="message">Message</label>
        <textarea
          id="message"
          rows="3"
          placeholder="Type something for the cow to say…"
          autofocus
        >Hello, PaintVM!</textarea>
      </div>

      <!-- Backend selector + wrap-width info -->
      <div class="row">
        <div class="field">
          <label>Render backend</label>
          <div class="backend-toggle">
            <input type="radio" name="backend" id="be-canvas" value="canvas" checked />
            <label class="pill" for="be-canvas">Canvas</label>
            <input type="radio" name="backend" id="be-svg" value="svg" />
            <label class="pill" for="be-svg">SVG</label>
          </div>
        </div>
        <div class="field">
          <label for="wrap-width">Wrap at (chars)</label>
          <input
            type="number"
            id="wrap-width"
            value="40"
            min="10"
            max="120"
            style="
              width:80px;
              padding:0.45rem 0.6rem;
              background:#0f172a;
              border:1px solid #334155;
              border-radius:8px;
              color:#e2e8f0;
              font-size:0.9375rem;
              outline:none;
            "
          />
        </div>
      </div>
    </div>

    <!-- Rendered output -->
    <div class="output-wrap">
      <div id="output"></div>
    </div>

    <footer>
      Rendered through PaintVM &mdash;
      Canvas path: <code>createCanvasVM().execute(scene, ctx)</code> &bull;
      SVG path: <code>renderToSvgString(scene)</code>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
