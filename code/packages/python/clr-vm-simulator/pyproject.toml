[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-clr-vm-simulator"
version = "0.1.0"
description = "Composable CLR VM simulator backed by the CLI runtime model"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["compiler", "clr", "cli", "cil", "runtime", "simulator", "dotnet"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Software Development :: Interpreters",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "coding-adventures-cli-runtime-model",
    "coding-adventures-clr-bytecode-disassembler",
    "coding-adventures-clr-pe-file",
    "coding-adventures-grammar-tools",
]

[tool.uv.sources]
coding-adventures-cil-bytecode-builder = { path = "../cil-bytecode-builder", editable = true }
coding-adventures-cli-assembly-writer = { path = "../cli-assembly-writer", editable = true }
coding-adventures-cli-runtime-model = { path = "../cli-runtime-model", editable = true }
coding-adventures-clr-bytecode-disassembler = { path = "../clr-bytecode-disassembler", editable = true }
coding-adventures-clr-pe-file = { path = "../clr-pe-file", editable = true }
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-directed-graph = { path = "../directed-graph", editable = true }
coding-adventures-dartmouth-basic-ir-compiler = { path = "../dartmouth-basic-ir-compiler", editable = true }
coding-adventures-dartmouth-basic-lexer = { path = "../dartmouth-basic-lexer", editable = true }
coding-adventures-dartmouth-basic-parser = { path = "../dartmouth-basic-parser", editable = true }
coding-adventures-grammar-tools = { path = "../grammar-tools", editable = true }
coding-adventures-graph = { path = "../graph", editable = true }
coding-adventures-ir-to-cil-bytecode = { path = "../ir-to-cil-bytecode", editable = true }
coding-adventures-lexer = { path = "../lexer", editable = true }
coding-adventures-parser = { path = "../parser", editable = true }
coding-adventures-state-machine = { path = "../state-machine", editable = true }

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/04f-clr-simulator.md"

[project.optional-dependencies]
dev = [
    "coding-adventures-cil-bytecode-builder",
    "coding-adventures-cli-assembly-writer",
    "coding-adventures-compiler-ir",
    "coding-adventures-directed-graph",
    "coding-adventures-dartmouth-basic-ir-compiler",
    "coding-adventures-dartmouth-basic-lexer",
    "coding-adventures-dartmouth-basic-parser",
    "coding-adventures-grammar-tools",
    "coding-adventures-graph",
    "coding-adventures-ir-to-cil-bytecode",
    "coding-adventures-lexer",
    "coding-adventures-parser",
    "coding-adventures-state-machine",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/clr_vm_simulator"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=clr_vm_simulator --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/clr_vm_simulator"]

[tool.coverage.report]
fail_under = 90
show_missing = true

[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = [
    "clr_bytecode_disassembler",
    "clr_pe_file",
]
ignore_missing_imports = true
