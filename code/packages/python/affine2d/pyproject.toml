[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-affine2d"
version = "0.1.0"
description = "2D affine transformation matrix — 6-float SVG/Canvas/PDF representation"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-trig @ file:../trig",
    "coding-adventures-point2d @ file:../point2d",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/affine2d"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=affine2d --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/affine2d"]

[tool.coverage.report]
fail_under = 80
show_missing = true
