[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-state-machine"
version = "0.1.0"
description = "Formal state machines (DFA, NFA, PDA, Modal) — foundation for parsers, protocols, and hardware"
requires-python = ">=3.12"
# Runtime dependency: coding-adventures-directed-graph
# Declared via BUILD file's -e ../directed-graph for local development and CI.
# When publishing to PyPI, restore: dependencies = ["coding-adventures-directed-graph"]
dependencies = []
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["state-machine", "automata", "dfa", "nfa", "pushdown-automaton", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/F01-state-machine.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/state_machine"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
    "ANN",  # type annotation enforcement
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=state_machine --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/state_machine"]

[tool.coverage.report]
fail_under = 80
show_missing = true
