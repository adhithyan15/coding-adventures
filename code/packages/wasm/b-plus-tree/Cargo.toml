[workspace]

[package]
name = "b-plus-tree-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust B+ tree crate via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
b-plus-tree = { path = "../../rust/b-plus-tree" }
js-sys = "0.3"
wasm-bindgen = "0.2"
