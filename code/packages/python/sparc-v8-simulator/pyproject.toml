[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-sparc-v8-simulator"
version = "0.1.0"
description = "Behavioral simulator for the SPARC V8 (1987) — Layer 07r"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "coding-adventures-simulator-protocol",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/sparc_v8_simulator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=sparc_v8_simulator --cov-report=term-missing --cov-fail-under=80"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "SIM"]
ignore = ["E501", "E701", "E702"]
