[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-cli-assembly-writer"
version = "0.1.0"
description = "Composable PE/CLI assembly writer for CLR backend artifacts"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["compiler", "clr", "cli", "cil", "pe", "dotnet"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Software Development :: Compilers",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "coding-adventures-ir-to-cil-bytecode",
]

[tool.uv.sources]
coding-adventures-cil-bytecode-builder = { path = "../cil-bytecode-builder", editable = true }
coding-adventures-clr-bytecode-disassembler = { path = "../clr-bytecode-disassembler", editable = true }
coding-adventures-clr-pe-file = { path = "../clr-pe-file", editable = true }
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-ir-to-cil-bytecode = { path = "../ir-to-cil-bytecode", editable = true }

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/04f-clr-simulator.md"

[project.optional-dependencies]
dev = [
    "coding-adventures-cil-bytecode-builder",
    "coding-adventures-clr-bytecode-disassembler",
    "coding-adventures-clr-pe-file",
    "coding-adventures-compiler-ir",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cli_assembly_writer"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=cli_assembly_writer --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/cli_assembly_writer"]

[tool.coverage.report]
fail_under = 90
show_missing = true
