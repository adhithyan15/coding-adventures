[workspace]

[package]
name = "fsharp-parser-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust F# parser"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
grammar_wasm_support = { package = "grammar-wasm-support", path = "../../rust/grammar-wasm-support" }
language_lexer = { package = "coding-adventures-fsharp-lexer", path = "../../rust/fsharp-lexer" }
language_parser = { package = "coding-adventures-fsharp-parser", path = "../../rust/fsharp-parser" }
wasm-bindgen = "0.2"
