[workspace]

[package]
name = "fenwick-tree-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust fenwick-tree crate via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
fenwick-tree = { path = "../../rust/fenwick-tree" }
wasm-bindgen = "0.2"
