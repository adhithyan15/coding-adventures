[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-lattice-lexer"
version = "0.1.0"
description = "Lattice tokenizer — tokenizes Lattice CSS superset source text"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-directed-graph",
    "coding-adventures-grammar-tools",
    "coding-adventures-lexer",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/lattice_lexer"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=lattice_lexer --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
omit = ["src/**/_grammar.py"]
source = ["src/lattice_lexer"]

[tool.coverage.report]
fail_under = 80
show_missing = true
