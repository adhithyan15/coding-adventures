[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-polynomial"
version = "0.4.0"
description = "Univariate polynomial arithmetic — coefficient-array representation, type-agnostic (int, float, Fraction, GF(2^8) …)"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/polynomial"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=polynomial --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/polynomial"]

[tool.coverage.report]
fail_under = 80
show_missing = true
