[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-wasm-module-encoder"
version = "0.1.0"
description = "Generic WebAssembly 1.0 module encoder: WasmModule to .wasm bytes"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-wasm-leb128",
    "coding-adventures-wasm-types",
]

[tool.uv.sources]
coding-adventures-wasm-leb128 = { path = "../wasm-leb128", editable = true }
coding-adventures-wasm-opcodes = { path = "../wasm-opcodes", editable = true }
coding-adventures-wasm-types = { path = "../wasm-types", editable = true }
coding-adventures-wasm-module-parser = { path = "../wasm-module-parser", editable = true }

[project.optional-dependencies]
dev = [
    "coding-adventures-wasm-opcodes",
    "coding-adventures-wasm-module-parser",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/wasm_module_encoder"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=wasm_module_encoder --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/wasm_module_encoder"]

[tool.coverage.report]
fail_under = 80
show_missing = true
