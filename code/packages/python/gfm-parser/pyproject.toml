[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-gfm-parser"
version = "0.1.0"
description = "GitHub Flavored Markdown parser producing a Document AST"
requires-python = ">=3.12"
dependencies = [
    "typing-extensions>=4.0",
    "coding-adventures-document-ast",
]
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["markdown", "commonmark", "parser", "ast", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Text Processing :: Markup :: Markdown",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10", "requests>=2.31"]

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_gfm_parser"]

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=coding_adventures_gfm_parser --cov-report=term-missing --cov-fail-under=70"

[tool.coverage.run]
source = ["src/coding_adventures_gfm_parser"]

[tool.coverage.report]
fail_under = 70
show_missing = true
