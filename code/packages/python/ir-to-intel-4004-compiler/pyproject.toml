[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-ir-to-intel-4004-compiler"
version = "0.1.0"
description = "Intel 4004 code generator facade: validates IrProgram and emits Intel 4004 assembly"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-compiler-ir",
    "coding-adventures-intel-4004-ir-validator",
]

[tool.uv.sources]
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-intel-4004-ir-validator = { path = "../intel-4004-ir-validator", editable = true }
coding-adventures-codegen-core = { path = "../codegen-core", editable = true }
coding-adventures-interpreter-ir = { path = "../interpreter-ir", editable = true }
coding-adventures-ir-optimizer = { path = "../ir-optimizer", editable = true }

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "coding-adventures-interpreter-ir", "coding-adventures-ir-optimizer", "coding-adventures-codegen-core"]

[tool.hatch.build.targets.wheel]
packages = [
    "src/ir_to_intel_4004_compiler",
    "src/intel_4004_backend",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=ir_to_intel_4004_compiler --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/ir_to_intel_4004_compiler"]

[tool.coverage.report]
fail_under = 80
show_missing = true
