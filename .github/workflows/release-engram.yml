# Electron Release — Engram Desktop App
#
# Builds the Engram desktop app for macOS, Windows, and Linux,
# then attaches the installers to a GitHub Release.
#
# Triggered by pushing a tag matching `engram-v*`:
#   git tag engram-v0.2.0
#   git push origin engram-v0.2.0
#
# Build steps per platform:
#   1. Install engram-app dependencies and build the Vite SPA
#      (base: "./" — relative paths work with Electron's file:// protocol)
#   2. Copy engram-app/dist/ → engram-electron/renderer/
#      (electron-builder bundles renderer/ into the packaged app)
#   3. Install engram-electron dependencies
#   4. Compile electron/main.ts → dist-electron/
#   5. Run electron-builder for the target platform
#
# Why a separate release job?
# Each platform produces a `builder-debug.yml` file. Collecting artifacts
# first and uploading once avoids conflicts on immutable releases.

name: Release Engram

on:
  push:
    tags:
      - "engram-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install shared package dependencies
        shell: bash
        run: |
          cd code/packages/typescript/indexeddb && npm install
          cd ../store && npm install
          cd ../ui-components && npm install

      - name: Install and build engram-app (renderer)
        shell: bash
        working-directory: code/programs/typescript/engram-app
        run: |
          npm install
          npm run build

      - name: Copy renderer into engram-electron
        shell: bash
        run: cp -r code/programs/typescript/engram-app/dist code/programs/typescript/engram-electron/renderer

      - name: Install engram-electron dependencies
        shell: bash
        working-directory: code/programs/typescript/engram-electron
        run: npm install

      - name: Compile Electron main process
        working-directory: code/programs/typescript/engram-electron
        shell: bash
        run: npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        working-directory: code/programs/typescript/engram-electron
        shell: bash
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload only the platform-specific installer files, not builder-debug.yml
      # or latest-*.yml which are duplicated across platforms.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            code/programs/typescript/engram-electron/release/*.AppImage
            code/programs/typescript/engram-electron/release/*.dmg
            code/programs/typescript/engram-electron/release/*.dmg.blockmap
            code/programs/typescript/engram-electron/release/*.zip
            code/programs/typescript/engram-electron/release/*.zip.blockmap
            code/programs/typescript/engram-electron/release/*.exe
            code/programs/typescript/engram-electron/release/*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
