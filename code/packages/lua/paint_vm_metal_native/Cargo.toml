[workspace]

[package]
name = "paint-vm-metal-native-lua"
version = "0.1.0"
edition = "2021"
description = "Lua C extension exposing the Metal Paint VM from Rust"
build = "build.rs"

[lib]
name = "paint_vm_metal_native"
crate-type = ["cdylib"]

[dependencies]
lua-bridge = { path = "../../rust/lua-bridge" }
paint-instructions = { path = "../../rust/paint-instructions" }
paint-metal = { path = "../../rust/paint-metal" }
