name: WaterSync
options:
  bundleIdPrefix: com.codingadventures
  deploymentTarget:
    iOS: "17.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"

targets:

  # ── iPhone app ────────────────────────────────────────────────────────
  WaterSync:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/Shared
      - Sources/WaterSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codingadventures.watersync
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/WaterSync/Info.plist
      properties:
        CFBundleDisplayName: WaterSync
        UILaunchScreen:
          UIColorName: ""

  # ── Watch app ─────────────────────────────────────────────────────────
  WaterSyncWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - Sources/Shared
      - Sources/WaterSyncWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codingadventures.watersync.watchapp
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/WaterSyncWatch/Info.plist
      properties:
        CFBundleDisplayName: WaterSync
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.codingadventures.watersync
