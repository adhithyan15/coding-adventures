# ================================================================
# CI — Incremental, parallel monorepo build with conditional toolchains
# ================================================================
#
# Single-job pipeline per platform:
#   1. Sets up Go and compiles the build tool.
#   2. Runs planning mode (`--emit-plan`) to detect changed packages and determine
#      which language toolchains are needed.
#   3. Conditionally installs only the needed toolchains (e.g. Python, Ruby, Node).
#   4. Executes the build using the generated JSON plan.
#
# This saves time by avoiding artifact uploads/downloads and skipping
# unneeded toolchain installations (e.g., Rust tarpaulin, Elixir/Erlang).

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
      fail-fast: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Determine diff base
        id: diff-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            BASE="HEAD~1"
          else
            git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
            BASE="origin/main"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Diff base: $BASE"

      - name: Check if main branch
        id: detect-main
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate build plan
        id: plan
        run: |
          cd code/programs/go/build-tool
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -o ../../../../build-tool.exe .
            BT=../../../../build-tool.exe
          else
            go build -o ../../../../build-tool .
            BT=../../../../build-tool
          fi
          cd ../../../..
          
          # FORCED FULL BUILD FOR PR VALIDATION
          $BT -root . -diff-base "${{ steps.diff-base.outputs.base }}" -force -emit-plan build-plan.json
          
          # Parse the emitted JSON to drive toolchain installations
          NEEDS_PYTHON=$(jq -r '.languages_needed.python // false' build-plan.json)
          echo "needs_python=$NEEDS_PYTHON" >> "$GITHUB_OUTPUT"
          
          NEEDS_RUBY=$(jq -r '.languages_needed.ruby // false' build-plan.json)
          echo "needs_ruby=$NEEDS_RUBY" >> "$GITHUB_OUTPUT"
          
          NEEDS_TYPESCRIPT=$(jq -r '.languages_needed.typescript // false' build-plan.json)
          echo "needs_typescript=$NEEDS_TYPESCRIPT" >> "$GITHUB_OUTPUT"
          
          NEEDS_RUST=$(jq -r '.languages_needed.rust // false' build-plan.json)
          echo "needs_rust=$NEEDS_RUST" >> "$GITHUB_OUTPUT"
          
          NEEDS_ELIXIR=$(jq -r '.languages_needed.elixir // false' build-plan.json)
          echo "needs_elixir=$NEEDS_ELIXIR" >> "$GITHUB_OUTPUT"
          
          NEEDS_LUA=$(jq -r '.languages_needed.lua // false' build-plan.json)
          echo "needs_lua=$NEEDS_LUA" >> "$GITHUB_OUTPUT"
          
          NEEDS_PERL=$(jq -r '.languages_needed.perl // false' build-plan.json)
          echo "needs_perl=$NEEDS_PERL" >> "$GITHUB_OUTPUT"

      # ── Language toolchains (conditional) ───────────────────────
      
      - name: Set up Python
        if: steps.plan.outputs.needs_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          allow-prereleases: true

      - name: Install uv
        if: steps.plan.outputs.needs_python == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.x"

      - name: Set up Ruby
        if: steps.plan.outputs.needs_ruby == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - name: Install bundler
        if: steps.plan.outputs.needs_ruby == 'true'
        run: gem install bundler

      - name: Set up Node.js
        if: steps.plan.outputs.needs_typescript == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        if: steps.plan.outputs.needs_rust == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        if: steps.plan.outputs.needs_rust == 'true' && runner.os == 'Linux'
        run: cargo install cargo-tarpaulin

      - name: Set up Elixir
        if: steps.plan.outputs.needs_elixir == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26.0'

      - name: Set up Lua
        if: steps.plan.outputs.needs_lua == 'true' && runner.os != 'Windows'
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks
        if: steps.plan.outputs.needs_lua == 'true' && runner.os != 'Windows'
        uses: leafo/gh-actions-luarocks@v4

      - name: Install Lua test tools
        if: steps.plan.outputs.needs_lua == 'true' && runner.os != 'Windows'
        run: |
          luarocks install busted
          luarocks install luacov
          luarocks install luacheck

      - name: Install cpanm and test dependencies (Perl)
        if: steps.plan.outputs.needs_perl == 'true' && runner.os != 'Windows'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y cpanminus
            sudo cpanm --quiet --notest Test2::V0
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cpanminus
            cpanm --quiet --notest Test2::V0
          fi

      - name: Install test runners
        run: |
          if [ "${{ steps.plan.outputs.needs_python }}" = "true" ]; then
            uv pip install --system pytest
          fi
          if [ "${{ steps.plan.outputs.needs_typescript }}" = "true" ]; then
            npm install -g jest
          fi

      # ── Verify toolchains ────────────────────────────────────
      - name: Verify tools
        run: |
          echo "Go: $(go version)"
          if [ "${{ steps.plan.outputs.needs_python }}" = "true" ]; then
            echo "Python: $(python --version)"
            echo "uv: $(uv --version)"
          fi
          if [ "${{ steps.plan.outputs.needs_ruby }}" = "true" ]; then
            echo "Ruby: $(ruby --version)"
            echo "Bundler: $(bundle --version)"
          fi
          if [ "${{ steps.plan.outputs.needs_typescript }}" = "true" ]; then
            echo "Node: $(node --version)"
            echo "npm: $(npm --version)"
          fi
          if [ "${{ steps.plan.outputs.needs_rust }}" = "true" ]; then
            echo "Rust: $(rustc --version)"
            echo "Cargo: $(cargo --version)"
          fi
          if [ "${{ steps.plan.outputs.needs_elixir }}" = "true" ]; then
            echo "Elixir: $(elixir --version)"
            echo "Mix: $(mix --version)"
          fi
          if [ "${{ steps.plan.outputs.needs_lua }}" = "true" ] && [ "$RUNNER_OS" != "Windows" ]; then
            echo "Lua: $(lua -v)"
            echo "LuaRocks: $(luarocks --version)"
          fi
          if [ "${{ steps.plan.outputs.needs_perl }}" = "true" ] && [ "$RUNNER_OS" != "Windows" ]; then
            echo "Perl: $(perl --version | head -2 | tail -1)"
            echo "cpanm: $(cpanm --version)"
          fi

      # ── Run the build ─────────────────────────────────────────
      - name: Build and test affected packages
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          PLAN_FLAG=""
          if [ -f build-plan.json ]; then
            PLAN_FLAG="-plan-file build-plan.json"
            echo "Using pre-computed build plan"
          fi
          $BT \
            -root . \
            $PLAN_FLAG \
            -language all

      # ── Force full build on main ──────────────────────────────
      - name: Full build on main merge
        if: steps.detect-main.outputs.is_main == 'true'
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          $BT -root . -force -language all
