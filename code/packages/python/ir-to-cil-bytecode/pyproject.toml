[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-ir-to-cil-bytecode"
version = "0.1.0"
description = "Composable compiler IR lowering into CIL method bytecode"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["compiler", "ir", "cil", "clr", "dotnet", "bytecode"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Software Development :: Compilers",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "coding-adventures-cil-bytecode-builder",
    "coding-adventures-compiler-ir",
]

[tool.uv.sources]
coding-adventures-cil-bytecode-builder = { path = "../cil-bytecode-builder", editable = true }
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-codegen-core = { path = "../codegen-core", editable = true }
coding-adventures-interpreter-ir = { path = "../interpreter-ir", editable = true }
coding-adventures-ir-optimizer = { path = "../ir-optimizer", editable = true }

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/04f-clr-simulator.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "coding-adventures-interpreter-ir",
    "coding-adventures-ir-optimizer",
    "coding-adventures-codegen-core",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ir_to_cil_bytecode"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=ir_to_cil_bytecode --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/ir_to_cil_bytecode"]

[tool.coverage.report]
fail_under = 90
show_missing = true

[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = "compiler_ir"
ignore_missing_imports = true
