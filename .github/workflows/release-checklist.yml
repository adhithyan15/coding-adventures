# Electron Release — Checklist App
#
# Builds the Checklist desktop app for macOS, Windows, and Linux,
# then attaches the installers to a GitHub Release.
#
# Triggered by pushing a tag matching `checklist-v*`:
#   git tag checklist-v0.6.0
#   git push origin checklist-v0.6.0
#
# The workflow:
#   1. Checks out the code on macOS, Ubuntu, and Windows runners (in parallel)
#   2. Installs all local package dependencies (indexeddb, store, ui-components)
#   3. Builds the Vite renderer + TypeScript main process
#   4. Packages with electron-builder (dmg/zip for macOS, nsis/portable for Windows, AppImage for Linux)
#   5. Uploads all artifacts to the GitHub Release created by the tag

name: Release Checklist

on:
  push:
    tags:
      - "checklist-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install local package dependencies
        shell: bash
        run: |
          cd code/packages/typescript/indexeddb && npm install
          cd ../store && npm install
          cd ../ui-components && npm install
          cd ../../../programs/typescript/checklist-app && npm install

      - name: Build renderer (Vite) + main process (tsc)
        working-directory: code/programs/typescript/checklist-app
        shell: bash
        run: |
          npm run build
          npx tsc -p electron/tsconfig.json

      - name: Package with electron-builder
        working-directory: code/programs/typescript/checklist-app
        shell: bash
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: code/programs/typescript/checklist-app/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
