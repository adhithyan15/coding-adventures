name: WaterWatch
options:
  bundleIdPrefix: com.codingadventures
  deploymentTarget:
    watchOS: "11.0"
  xcodeVersion: "16.0"

targets:
  WaterWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - Sources/WaterWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codingadventures.waterwatch
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/WaterWatch/Info.plist
      properties:
        CFBundleDisplayName: WaterWatch
        WKApplication: true
        WKWatchOnly: true
