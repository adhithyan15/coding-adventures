[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-compiler-source-map"
version = "0.1.0"
description = "Source map chain sidecar for the AOT compiler pipeline"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["compiler", "source-map", "debuginfo", "aot", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Software Development :: Compilers",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "coding-adventures-compiler-ir",
]

[tool.uv.sources]
# Sibling packages are installed via local file paths — not from PyPI.
# This tells uv where to find them during local development.
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=compiler_source_map --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/compiler_source_map"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.hatch.build.targets.wheel]
packages = ["src/compiler_source_map"]
