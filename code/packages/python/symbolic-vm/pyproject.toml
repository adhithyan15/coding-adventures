[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-symbolic-vm"
version = "0.36.0"
description = "Pluggable symbolic VM — evaluates symbolic-ir trees through swappable backends (strict numeric vs. Mathematica-style symbolic rewriting)."
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["symbolic", "vm", "interpreter", "cas", "term-rewriting", "education"]
dependencies = [
    "coding-adventures-symbolic-ir>=0.8.0",
    "coding-adventures-polynomial",
    "coding-adventures-macsyma-parser",
    "coding-adventures-macsyma-compiler",
    "coding-adventures-cas-pattern-matching",
    "coding-adventures-cas-substitution",
    "coding-adventures-cas-simplify",
    "coding-adventures-cas-factor>=0.3.0",
    "coding-adventures-cas-solve>=0.6.0",
    "coding-adventures-cas-list-operations",
    "coding-adventures-cas-matrix>=0.2.0",
    "coding-adventures-cas-limit-series",
    "coding-adventures-cas-number-theory>=0.1.0",
    "coding-adventures-cas-complex>=0.1.0",
    "coding-adventures-cas-trig>=0.1.0",
    "coding-adventures-cas-mnewton",
    "coding-adventures-cas-laplace>=0.1.0",
    "coding-adventures-cas-fourier>=0.1.0",
    "coding-adventures-cas-ode>=0.1.0",
    "coding-adventures-cas-algebraic>=0.1.0",
    "coding-adventures-cas-multivariate>=0.1.0",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/symbolic_vm"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=symbolic_vm --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.report]
fail_under = 80
show_missing = true
