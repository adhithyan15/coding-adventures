[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-intel-4004-ir-validator"
version = "0.1.0"
description = "Intel 4004 IR validator: checks IrProgram hardware feasibility before assembly generation"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-compiler-ir",
]

[tool.uv.sources]
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/intel_4004_ir_validator"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=intel_4004_ir_validator --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/intel_4004_ir_validator"]

[tool.coverage.report]
fail_under = 80
show_missing = true
