[workspace]

[package]
name = "url-parser-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust url-parser crate via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
url-parser = { path = "../../rust/url-parser" }
wasm-bindgen = "0.2"
