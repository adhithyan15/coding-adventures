[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-correlation-vector"
version = "0.1.0"
description = "Append-only provenance tracking for any data pipeline — assign a CV ID at birth, append contributions at every stage"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = [
    "correlation-vector",
    "provenance",
    "tracing",
    "pipeline",
    "computer-science",
    "education",
]
# Runtime dependencies: json-value (for parse_native) and json-serializer
# (for stringify).  All transitive deps are listed here so uv can resolve
# the full graph when this package is installed in isolation.
dependencies = [
    "coding-adventures-sha256",
    "coding-adventures-json-value",
    "coding-adventures-json-serializer",
    "coding-adventures-directed-graph",
    "coding-adventures-grammar-tools",
    "coding-adventures-json-lexer",
    "coding-adventures-json-parser",
    "coding-adventures-lexer",
    "coding-adventures-parser",
    "coding-adventures-state-machine",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_correlation_vector"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (modern Python syntax)
    "B",   # bugbear (common bugs)
    "SIM", # simplify
    "ANN", # type annotation enforcement
]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=coding_adventures_correlation_vector --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/coding_adventures_correlation_vector"]

[tool.coverage.report]
fail_under = 95
show_missing = true
