[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-grammar-tools"
version = "0.1.0"
description = "Define and validate .tokens and .grammar file formats — grammar-driven lexer and parser generation"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["grammar", "lexer-generator", "parser-generator", "ebnf", "computer-science", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.scripts]
grammar-tools = "grammar_tools.cli:main"

[project.optional-dependencies]
cli = [
    "coding-adventures-graph",
    "coding-adventures-directed-graph",
    "coding-adventures-state-machine",
    "coding-adventures-cli-builder",
]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.uv.sources]
coding-adventures-cli-builder = { path = "../cli-builder", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/grammar_tools"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
    "ANN",  # type annotation enforcement
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=grammar_tools --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/grammar_tools"]

[tool.coverage.report]
fail_under = 80
show_missing = true
