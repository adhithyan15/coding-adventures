[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-music-machine"
version = "0.1.0"
description = "Text score parser and music machine for rendering note melodies to PCM"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-note-frequency>=0.1.0",
    "coding-adventures-note-audio>=0.1.0",
    "coding-adventures-musical-instruments>=0.1.0",
    "coding-adventures-oscillator>=0.1.0",
    "coding-adventures-pcm-audio>=0.1.0",
    "coding-adventures-trig>=0.1.0",
    "coding-adventures-virtual-dac>=0.1.0",
    "coding-adventures-virtual-speaker>=0.1.0",
    "coding-adventures-wav-sink>=0.1.0",
]

[project.optional-dependencies]
playback = ["coding-adventures-audio-device-sink>=0.1.0"]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.uv.sources]
coding-adventures-note-frequency = { path = "../note-frequency", editable = true }
coding-adventures-note-audio = { path = "../note-audio", editable = true }
coding-adventures-musical-instruments = { path = "../musical-instruments", editable = true }
coding-adventures-oscillator = { path = "../oscillator", editable = true }
coding-adventures-pcm-audio = { path = "../pcm-audio", editable = true }
coding-adventures-trig = { path = "../trig", editable = true }
coding-adventures-virtual-dac = { path = "../virtual-dac", editable = true }
coding-adventures-virtual-speaker = { path = "../virtual-speaker", editable = true }
coding-adventures-wav-sink = { path = "../wav-sink", editable = true }
coding-adventures-audio-device-sink = { path = "../audio-device-sink", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/music_machine"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=music_machine --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/music_machine"]

[tool.coverage.report]
fail_under = 95
show_missing = true
