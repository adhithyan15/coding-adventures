[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-single-layer-network"
version = "0.1.0"
description = "Single-layer multi-input multi-output neural network primitives"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/single_layer_network"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
