[workspace]

[package]
name = "binary-search-tree-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust binary-search-tree crate via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
binary-search-tree = { path = "../../rust/binary-search-tree" }
wasm-bindgen = "0.2"
