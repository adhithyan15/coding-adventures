[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-reed-solomon"
version = "0.1.0"
description = "Reed-Solomon error-correcting codes over GF(256) — MA02 implementation"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = ["coding-adventures-gf256>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/reed_solomon"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=reed_solomon --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/reed_solomon"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
