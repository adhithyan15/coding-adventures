[project]
name = "coding-adventures-matrix"
version = "1.0.0"
description = "Pure mathematical 2D matrix operations"
requires-python = ">=3.9"

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/matrix"]
