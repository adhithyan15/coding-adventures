[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-codegen-core"
version = "0.1.0"
description = "codegen-core: unified IR-to-native compilation layer for all LANG pipeline paths (LANG19)"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["codegen", "compiler", "jit", "aot", "backend", "register-machine", "education"]
dependencies = [
    "coding-adventures-interpreter-ir",
    "coding-adventures-compiler-ir",
    "coding-adventures-ir-optimizer",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Software Development :: Compilers",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/codegen_core"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
addopts = "--cov=codegen_core --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/codegen_core"]

[tool.coverage.report]
fail_under = 90
show_missing = true
