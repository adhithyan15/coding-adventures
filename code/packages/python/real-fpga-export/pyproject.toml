[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-real-fpga-export"
version = "0.1.0"
description = "Emit structural Verilog from HIR for the open-tool FPGA flow (yosys/nextpnr/icepack)."
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["verilog", "hdl", "fpga", "ice40", "yosys", "nextpnr", "education"]
dependencies = [
    "coding-adventures-hdl-ir",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering :: Electronic Design Automation (EDA)",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/real-fpga-export.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/real_fpga_export"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN", "E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=real_fpga_export --cov-report=term-missing --cov-fail-under=70"

[tool.coverage.run]
source = ["src/real_fpga_export"]

[tool.coverage.report]
fail_under = 70
show_missing = true
