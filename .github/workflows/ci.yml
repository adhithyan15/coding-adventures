# ================================================================
# CI — Incremental, parallel monorepo build
# ================================================================
#
# This workflow uses the Go build tool to build and test only the
# packages that changed. The Go binary is compiled from source on
# every run (~1-2 seconds).
#
# Change detection: git diff against the base branch determines which
# files changed, maps them to packages, then uses the dependency graph
# to find all affected packages (changed + transitive dependents).
#
# Parallelism: independent packages run concurrently via goroutines.
#
# Tiered strategy:
# - Every push: Linux only (fast feedback)
# - PRs to main: Linux + macOS + Windows (thorough validation)

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff

      # ── Language toolchains ───────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - name: Install bundler
        shell: bash
        run: gem install bundler

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        if: runner.os == 'Linux'
        run: cargo install cargo-tarpaulin

      - name: Set up Elixir
        if: runner.os != 'Windows'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26.0'

      - name: Install test runners
        shell: bash
        run: |
          uv pip install --system pytest
          npm install -g jest

      # ── Verify toolchains ────────────────────────────────────
      - name: Verify tools
        shell: bash
        run: |
          echo "Python: $(python --version)"
          echo "uv: $(uv --version)"
          echo "Ruby: $(ruby --version)"
          echo "Bundler: $(bundle --version)"
          echo "Go: $(go version)"
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "Rust: $(rustc --version)"
          echo "Cargo: $(cargo --version)"
          if command -v elixir &>/dev/null; then
            echo "Elixir: $(elixir --version)"
            echo "Mix: $(mix --version)"
          else
            echo "Elixir: not installed (skipped on this platform)"
          fi

      # ── Build the build tool ──────────────────────────────────
      - name: Compile build tool
        shell: bash
        run: |
          cd code/programs/go/build-tool
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -o ../../../../build-tool.exe .
          else
            go build -o ../../../../build-tool .
          fi

      # ── Determine what to build ───────────────────────────────
      - name: Determine diff base
        id: diff-base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            # On main, compare against previous commit
            BASE="HEAD~1"
          else
            # On feature branches, compare against origin/main
            # Fetch main first in case it's not available
            git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
            BASE="origin/main"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Diff base: $BASE"

      # ── Run the build ─────────────────────────────────────────
      #
      # On Windows we force-build everything because Windows CI is new
      # and we need to validate that all BUILD_windows files actually
      # work. Once Windows CI is stable, this can switch to diff-based
      # like Linux and macOS.
      - name: Build and test affected packages
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Force-build on Windows to validate BUILD_windows files.
            # Skip Elixir — erlef/setup-beam doesn't support Windows.
            for lang in python ruby go rust typescript; do
              echo "=== Building $lang packages ==="
              $BT -root . -force -language "$lang"
            done
          else
            $BT \
              -root . \
              -diff-base "${{ steps.diff-base.outputs.base }}" \
              -language all
          fi

      # ── Force full build on main ──────────────────────────────
      - name: Full build on main merge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          $BT -root . -force -language all
