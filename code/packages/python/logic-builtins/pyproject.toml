[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-logic-builtins"
version = "0.14.0"
description = "Prolog-inspired integer generators, finite-domain constraints, arithmetic, cut, dynamic database, callable-term, predicate-metadata, term-order, control, and metaprogramming builtins for Python"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-logic-engine>=0.10.0",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/LP18-logic-prolog-functionality-batches.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.uv.sources]
coding-adventures-logic-engine = { path = "../logic-engine", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/logic_builtins"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=logic_builtins --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/logic_builtins"]

[tool.coverage.report]
fail_under = 80
show_missing = true
