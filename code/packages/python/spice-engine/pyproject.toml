[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-spice-engine"
version = "0.1.0"
description = "SPICE-compatible analog circuit simulator with MNA + Newton-Raphson DC + transient."
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["spice", "analog", "simulator", "mna", "education"]
dependencies = [
    "coding-adventures-mosfet-models",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering :: Physics",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/spice-engine.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/spice_engine"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN", "E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=spice_engine --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/spice_engine"]

[tool.coverage.report]
fail_under = 80
show_missing = true
