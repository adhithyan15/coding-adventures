[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-document-html-sanitizer"
version = "0.1.0"
description = "Document HTML Sanitizer — regex-based HTML string sanitizer for untrusted HTML"
requires-python = ">=3.12"
dependencies = []
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["sanitizer", "html", "xss", "security", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Security",
    "Topic :: Text Processing :: Markup :: HTML",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/TE02-document-sanitization.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_document_html_sanitizer"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=coding_adventures_document_html_sanitizer --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/coding_adventures_document_html_sanitizer"]

[tool.coverage.report]
fail_under = 90
show_missing = true
