[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-arc2d"
version = "0.1.0"
description = "Elliptical arcs with endpoint↔center form conversion"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-trig",
    "coding-adventures-point2d",
    "coding-adventures-bezier2d",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/arc2d"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=arc2d --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/arc2d"]

[tool.coverage.report]
fail_under = 80
show_missing = true
