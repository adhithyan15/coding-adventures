[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-image-codec-qoi"
version = "0.1.0"
description = "IC03: QOI image encoder and decoder using PixelContainer"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = ["coding-adventures-pixel-container>=0.1.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/image_codec_qoi"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=image_codec_qoi --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/image_codec_qoi"]

[tool.coverage.report]
fail_under = 90
show_missing = true

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
