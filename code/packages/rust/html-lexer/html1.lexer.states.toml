format = "state-machine/v1"
profile = "lexer/v1"
name = "html1-lexer"
kind = "transducer"
version = "0.1.0"
runtime_min = "state-machine-tokenizer/0.1"
initial = "data"
done = "done"
includes = []
alphabet = [
  "<",
  ">",
  "/",
  "&",
  ";",
  "=",
  "!",
  "-",
  "\"",
  "'",
  " ",
  "\n",
  "\t",
  "\r",
  "D",
  "d",
  "O",
  "o",
  "C",
  "c",
  "T",
  "t",
  "L",
  "l",
  "Y",
  "y",
  "P",
  "p",
  "E",
  "e",
]

[[tokens]]
name = "Text"
fields = ["data"]

[[tokens]]
name = "StartTag"
fields = ["name", "attributes", "self_closing"]

[[tokens]]
name = "EndTag"
fields = ["name"]

[[tokens]]
name = "Comment"
fields = ["data"]

[[tokens]]
name = "Doctype"
fields = ["name", "force_quirks"]

[[tokens]]
name = "EOF"
fields = []

[[registers]]
id = "text_buffer"
type = "string"

[[registers]]
id = "current_token"
type = "token?"

[[registers]]
id = "current_attribute"
type = "attribute?"

[[registers]]
id = "temporary_buffer"
type = "string"

[[registers]]
id = "return_state"
type = "state?"

[[states]]
id = "data"
initial = true

[[states]]
id = "rcdata"
external_entry = true

[[states]]
id = "rawtext"
external_entry = true

[[states]]
id = "rcdata_less_than_sign"

[[states]]
id = "rawtext_less_than_sign"

[[states]]
id = "rcdata_end_tag_open"

[[states]]
id = "rawtext_end_tag_open"

[[states]]
id = "rcdata_end_tag_name"

[[states]]
id = "rawtext_end_tag_name"

[[states]]
id = "rcdata_character_reference"

[[states]]
id = "rcdata_character_reference_l"

[[states]]
id = "rcdata_character_reference_lt"

[[states]]
id = "tag_open"

[[states]]
id = "end_tag_open"

[[states]]
id = "tag_name"

[[states]]
id = "end_tag_name"

[[states]]
id = "before_attribute_name"

[[states]]
id = "attribute_name"

[[states]]
id = "after_attribute_name"

[[states]]
id = "before_attribute_value"

[[states]]
id = "attribute_value_double_quoted"

[[states]]
id = "attribute_value_single_quoted"

[[states]]
id = "attribute_value_unquoted"

[[states]]
id = "after_attribute_value_quoted"

[[states]]
id = "self_closing_start_tag"

[[states]]
id = "markup_declaration_open"

[[states]]
id = "comment_start"

[[states]]
id = "comment"

[[states]]
id = "comment_end_dash"

[[states]]
id = "comment_end"

[[states]]
id = "bogus_comment"

[[states]]
id = "doctype_keyword_o"

[[states]]
id = "doctype_keyword_c"

[[states]]
id = "doctype_keyword_t"

[[states]]
id = "doctype_keyword_y"

[[states]]
id = "doctype_keyword_p"

[[states]]
id = "doctype_keyword_e"

[[states]]
id = "doctype_after_keyword"

[[states]]
id = "before_doctype_name"

[[states]]
id = "doctype_name"

[[states]]
id = "after_doctype_name"

[[states]]
id = "before_end_tag_close"

[[states]]
id = "done"
final = true

[[transitions]]
from = "data"
matcher = { literal = "<" }
to = "tag_open"
actions = ["flush_text"]

[[transitions]]
from = "data"
matcher = { eof = true }
to = "done"
consume = false
actions = ["flush_text", "emit(EOF)"]

[[transitions]]
from = "data"
matcher = { anything = true }
to = "data"
actions = ["append_text(current)"]

[[transitions]]
from = "rcdata"
matcher = { literal = "<" }
to = "rcdata_less_than_sign"
actions = ["flush_text"]

[[transitions]]
from = "rcdata"
matcher = { literal = "&" }
to = "rcdata_character_reference"
actions = ["clear_temporary_buffer", "append_temporary_buffer(&)"]

[[transitions]]
from = "rcdata"
matcher = { eof = true }
to = "done"
consume = false
actions = ["flush_text", "emit(EOF)"]

[[transitions]]
from = "rcdata"
matcher = { anything = true }
to = "rcdata"
actions = ["append_text(current)"]

[[transitions]]
from = "rawtext"
matcher = { literal = "<" }
to = "rawtext_less_than_sign"
actions = ["flush_text"]

[[transitions]]
from = "rawtext"
matcher = { eof = true }
to = "done"
consume = false
actions = ["flush_text", "emit(EOF)"]

[[transitions]]
from = "rawtext"
matcher = { anything = true }
to = "rawtext"
actions = ["append_text(current)"]

[[transitions]]
from = "rcdata_less_than_sign"
matcher = { literal = "/" }
to = "rcdata_end_tag_open"
actions = ["clear_temporary_buffer"]

[[transitions]]
from = "rcdata_less_than_sign"
matcher = { eof = true }
to = "done"
consume = false
actions = ["append_text(<)", "flush_text", "emit(EOF)"]

[[transitions]]
from = "rcdata_less_than_sign"
matcher = { anything = true }
to = "rcdata"
consume = false
actions = ["append_text(<)"]

[[transitions]]
from = "rawtext_less_than_sign"
matcher = { literal = "/" }
to = "rawtext_end_tag_open"
actions = ["clear_temporary_buffer"]

[[transitions]]
from = "rawtext_less_than_sign"
matcher = { eof = true }
to = "done"
consume = false
actions = ["append_text(<)", "flush_text", "emit(EOF)"]

[[transitions]]
from = "rawtext_less_than_sign"
matcher = { anything = true }
to = "rawtext"
consume = false
actions = ["append_text(<)"]

[[transitions]]
from = "rcdata_end_tag_open"
matcher = { eof = true }
to = "done"
consume = false
actions = ["append_text(</)", "flush_text", "emit(EOF)"]

[[transitions]]
from = "rcdata_end_tag_open"
matcher = { anything = true }
to = "rcdata_end_tag_name"
actions = [
  "create_end_tag",
  "append_tag_name(current_lowercase)",
  "append_temporary_buffer(current_lowercase)",
]

[[transitions]]
from = "rawtext_end_tag_open"
matcher = { eof = true }
to = "done"
consume = false
actions = ["append_text(</)", "flush_text", "emit(EOF)"]

[[transitions]]
from = "rawtext_end_tag_open"
matcher = { anything = true }
to = "rawtext_end_tag_name"
actions = [
  "create_end_tag",
  "append_tag_name(current_lowercase)",
  "append_temporary_buffer(current_lowercase)",
]

[[transitions]]
from = "rcdata_end_tag_name"
matcher = { literal = ">" }
to = "rcdata"
actions = ["emit_rcdata_end_tag_or_text"]

[[transitions]]
from = "rcdata_end_tag_name"
matcher = { eof = true }
to = "done"
consume = false
actions = [
  "discard_current_token",
  "append_text(</)",
  "append_temporary_buffer_to_text",
  "flush_text",
  "emit(EOF)",
]

[[transitions]]
from = "rcdata_end_tag_name"
matcher = { anything = true }
to = "rcdata_end_tag_name"
actions = [
  "append_tag_name(current_lowercase)",
  "append_temporary_buffer(current_lowercase)",
]

[[transitions]]
from = "rawtext_end_tag_name"
matcher = { literal = ">" }
to = "rawtext"
actions = ["emit_rcdata_end_tag_or_text"]

[[transitions]]
from = "rawtext_end_tag_name"
matcher = { eof = true }
to = "done"
consume = false
actions = [
  "discard_current_token",
  "append_text(</)",
  "append_temporary_buffer_to_text",
  "flush_text",
  "emit(EOF)",
]

[[transitions]]
from = "rawtext_end_tag_name"
matcher = { anything = true }
to = "rawtext_end_tag_name"
actions = [
  "append_tag_name(current_lowercase)",
  "append_temporary_buffer(current_lowercase)",
]

[[transitions]]
from = "rcdata_character_reference"
matcher = { literal = "L" }
to = "rcdata_character_reference_l"
actions = ["append_temporary_buffer(current_lowercase)"]

[[transitions]]
from = "rcdata_character_reference"
matcher = { literal = "l" }
to = "rcdata_character_reference_l"
actions = ["append_temporary_buffer(current_lowercase)"]

[[transitions]]
from = "rcdata_character_reference"
matcher = { eof = true }
to = "done"
consume = false
actions = ["append_temporary_buffer_to_text", "flush_text", "emit(EOF)"]

[[transitions]]
from = "rcdata_character_reference"
matcher = { anything = true }
to = "rcdata"
consume = false
actions = ["append_temporary_buffer_to_text"]

[[transitions]]
from = "rcdata_character_reference_l"
matcher = { literal = "T" }
to = "rcdata_character_reference_lt"
actions = ["append_temporary_buffer(current_lowercase)"]

[[transitions]]
from = "rcdata_character_reference_l"
matcher = { literal = "t" }
to = "rcdata_character_reference_lt"
actions = ["append_temporary_buffer(current_lowercase)"]

[[transitions]]
from = "rcdata_character_reference_l"
matcher = { eof = true }
to = "done"
consume = false
actions = ["append_temporary_buffer_to_text", "flush_text", "emit(EOF)"]

[[transitions]]
