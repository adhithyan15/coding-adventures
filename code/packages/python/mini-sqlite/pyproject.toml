[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-mini-sqlite"
version = "1.2.0"
description = "PEP 249 DB-API 2.0 facade over the sql-lexer / parser / planner / optimizer / codegen / vm / backend stack."
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["sql", "database", "dbapi", "sqlite", "pep-249", "education"]
dependencies = [
    "coding-adventures-directed-graph",
    "coding-adventures-grammar-tools",
    "coding-adventures-graph",
    "coding-adventures-lexer",
    "coding-adventures-parser",
    "coding-adventures-sql-backend",
    "coding-adventures-sql-codegen",
    "coding-adventures-sql-lexer",
    "coding-adventures-sql-optimizer",
    "coding-adventures-sql-parser",
    "coding-adventures-sql-planner",
    "coding-adventures-sql-vm",
    "coding-adventures-state-machine",
    "coding-adventures-storage-sqlite",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Education",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Database :: Database Engines/Servers",
    "Topic :: Education",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[tool.hatch.build.targets.wheel]
packages = ["src/mini_sqlite"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=mini_sqlite --cov-report=term-missing --cov-fail-under=80"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN"]
