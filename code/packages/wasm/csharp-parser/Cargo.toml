[workspace]

[package]
name = "csharp-parser-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust C# parser"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
grammar_wasm_support = { package = "grammar-wasm-support", path = "../../rust/grammar-wasm-support" }
language_lexer = { package = "coding-adventures-csharp-lexer", path = "../../rust/csharp-lexer" }
language_parser = { package = "coding-adventures-csharp-parser", path = "../../rust/csharp-parser" }
wasm-bindgen = "0.2"
