[workspace]

[package]
name = "gf256-native-perl"
version = "0.1.0"
edition = "2021"
description = "Perl XS extension exposing GF(256) Galois Field arithmetic from Rust"

[lib]
name = "GF256Native"
crate-type = ["cdylib"]

build = "build.rs"

[dependencies]
perl-bridge = { path = "../../rust/perl-bridge" }
gf256 = { path = "../../rust/gf256" }
