[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-aes-modes"
version = "0.1.0"
description = "AES modes of operation — ECB, CBC, CTR, GCM"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = ["coding-adventures-aes"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0"]

[tool.uv.sources]
coding-adventures-aes = { path = "../aes", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_aes_modes"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=coding_adventures_aes_modes --cov-report=term-missing"

[tool.coverage.run]
source = ["src/coding_adventures_aes_modes"]

[tool.coverage.report]
show_missing = true
