name: WaterPersist
options:
  bundleIdPrefix: com.codingadventures
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  WaterPersist:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/WaterPersist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codingadventures.waterpersist
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: 5.9
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/WaterPersist/Info.plist
      properties:
        CFBundleDisplayName: WaterPersist
        UILaunchScreen:
          UIColorName: ""

  WaterPersistTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/WaterPersistTests
    dependencies:
      - target: WaterPersist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codingadventures.waterpersisttests
        SWIFT_VERSION: 5.9
