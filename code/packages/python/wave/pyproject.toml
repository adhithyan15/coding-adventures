[project]
name = "coding-adventures-wave"
version = "0.1.0"
description = "Simple harmonic wave model from first principles"
requires-python = ">=3.9"

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_wave"]
