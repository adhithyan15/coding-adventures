[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-pixel-container"
version = "0.1.0"
description = "IC00: Universal RGBA8 pixel buffer and image codec interface — zero dependencies"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/pixel_container"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=pixel_container --cov-report=term-missing --cov-fail-under=90"

[tool.coverage.run]
source = ["src/pixel_container"]

[tool.coverage.report]
fail_under = 90
show_missing = true

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
