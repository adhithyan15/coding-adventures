[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-intel4004-simulator"
version = "0.1.0"
description = "Intel 4004 first microprocessor simulation — Layer 4d of the computing stack"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["intel-4004", "microprocessor", "historical", "4-bit", "simulator", "computer-science", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = ["coding-adventures-virtual-machine", "coding-adventures-simulator-protocol"]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/07d-intel4004-simulator.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "coding-adventures-arithmetic",
    "coding-adventures-cpu-simulator",
    "coding-adventures-logic-gates",
]

[tool.hatch.build.targets.wheel]
packages = ["src/intel4004_simulator"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
    "ANN",  # type annotation enforcement
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=intel4004_simulator --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/intel4004_simulator"]

[tool.coverage.report]
fail_under = 80
show_missing = true
