[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-prolog-core"
version = "0.1.0"
description = "Shared Prolog runtime model objects such as operator tables and directives"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-logic-engine>=0.10.0",
    "coding-adventures-symbol-core>=0.1.0",
]
keywords = ["prolog", "logic-programming", "operators", "directives", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/PR05-prolog-operator-directive-model.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.uv.sources]
coding-adventures-logic-engine = { path = "../logic-engine", editable = true }
coding-adventures-symbol-core = { path = "../symbol-core", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/prolog_core"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=prolog_core --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/prolog_core"]

[tool.coverage.report]
fail_under = 80
show_missing = true
