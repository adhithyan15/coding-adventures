[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-hmac"
version = "0.1.0"
description = "HMAC (Hash-based Message Authentication Code) — RFC 2104 / FIPS 198-1 — implemented from scratch"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-md5",
    "coding-adventures-sha1",
    "coding-adventures-sha256",
    "coding-adventures-sha512",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_hmac"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=coding_adventures_hmac --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/coding_adventures_hmac"]

[tool.coverage.report]
fail_under = 80
show_missing = true
