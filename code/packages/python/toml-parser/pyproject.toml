[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-toml-parser"
version = "0.1.0"
description = "Parses TOML text into Python dicts — grammar-driven parse + semantic validation"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["toml", "parser", "grammar-driven", "ast", "computer-science", "education"]
# Runtime dependency: coding-adventures-toml-lexer
# Declared via BUILD file's -e ../toml-lexer for local development and CI.
# When publishing to PyPI, restore: dependencies = ["coding-adventures-toml-lexer"]
dependencies = []
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/toml_parser"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
    "ANN",  # type annotation enforcement
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=toml_parser --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
omit = ["src/**/_grammar.py"]
source = ["src/toml_parser"]

[tool.coverage.report]
fail_under = 80
show_missing = true
