[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-content-addressable-storage"
version = "0.1.0"
description = "Generic content-addressable storage (CAS) with pluggable backend and SHA-1 integrity verification"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = ["coding-adventures-sha1"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_content_addressable_storage"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = [
    # S324: Use of insecure MD2, MD4, MD5, or SHA1 value
    # SHA-1 is intentional here — CAS uses it as a content identifier, not
    # a security primitive.  The Rust reference implementation uses SHA-1
    # for the same reason (compatibility with Git object layout).
    "S324",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=coding_adventures_content_addressable_storage --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/coding_adventures_content_addressable_storage"]

[tool.coverage.report]
fail_under = 95
show_missing = true

[tool.mypy]
strict = true
python_version = "3.12"
