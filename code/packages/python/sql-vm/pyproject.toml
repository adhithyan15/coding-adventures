[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-sql-vm"
version = "1.4.0"
description = "Dispatch-loop virtual machine that executes sql-codegen Programs against a pluggable Backend."
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["sql", "virtual-machine", "bytecode", "interpreter", "database", "education"]
dependencies = [
    "coding-adventures-sql-backend",
    "coding-adventures-sql-codegen",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Database",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.uv.sources]
coding-adventures-sql-backend = { path = "../sql-backend", editable = true }
coding-adventures-sql-codegen = { path = "../sql-codegen", editable = true }
coding-adventures-sql-planner = { path = "../sql-planner", editable = true }
coding-adventures-sql-optimizer = { path = "../sql-optimizer", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/sql_vm"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=sql_vm --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/sql_vm"]
omit = ["**/sql_vm/* 2.py"]

[tool.coverage.report]
fail_under = 80
show_missing = true
