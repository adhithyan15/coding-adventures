# =============================================================================
# LANG-runtime safety CI — deep Miri (post-merge + nightly)
# =============================================================================
#
# Why this workflow exists (PR 7, refined):
#
# `lang-runtime-safety.yml` runs Miri on `lang-runtime-core` +
# `lispy-runtime` as a *blocking* check on every PR (~5 min, fast).
# That covers all the unsafe code in the stack.  `twig-vm` has zero
# unsafe of its own; its Miri value is the integration seam, which
# is *already* exercised by lispy-runtime's own Miri suite plus a
# local pre-push verification.  Running twig-vm Miri on every PR
# was costing 1h+ wallclock per PR for redundant coverage —
# blocking iteration speed.
#
# **This workflow runs only post-merge** (push to main) **and
# nightly** (cron).  Three reasons:
#
#   1. Post-merge runs catch regressions immediately after a PR
#      lands, without slowing down the PR itself.
#   2. The nightly cron is belt-and-braces against admin merges or
#      force-pushes that bypass per-PR CI.
#   3. **Nothing in this workflow is `blocking`.**  Even on main,
#      if twig-vm Miri fails, the workflow record stays in the
#      Actions UI as a regression marker but doesn't propagate to
#      main's status badge — twig-vm has no unsafe, so a Miri
#      failure here is an integration-seam regression to
#      investigate, not a "main is broken" signal.
#
# Local pre-push: `scripts/miri-twig-vm.sh` is the canonical
# verification engineers run before pushing changes that touch
# twig-vm.  The post-merge run here is the safety net.

name: LANG-runtime safety (deep — post-merge + nightly)

on:
  push:
    branches: [main]
    paths:
      - 'code/packages/rust/lang-runtime-core/**'
      - 'code/packages/rust/lispy-runtime/**'
      - 'code/packages/rust/twig-vm/**'
      - 'code/packages/rust/interpreter-ir/**'
      - '.github/workflows/lang-runtime-safety-deep.yml'
  schedule:
    # 03:13 UTC daily.  Off-cycle vs. main business hours so a
    # regression is visible at the start of the next workday but
    # doesn't compete for runner capacity during peak push times.
    # Avoiding the :00 minute mark to spread load across runners.
    - cron: "13 3 * * *"
  workflow_dispatch:
    # Allow manual runs from the Actions UI for ad-hoc verification
    # without waiting for the next scheduled run.

permissions:
  contents: read

jobs:
  miri-twig-vm:
    name: Miri — twig-vm (informational, never blocks)
    runs-on: ubuntu-latest
    # Informational on main + nightly: even if Miri fails or times
    # out, the workflow run stays in history as a regression marker
    # but the result doesn't count as "main is broken".  twig-vm
    # has zero unsafe code; a Miri failure here is an integration-
    # seam signal worth investigating, not a release blocker.
    continue-on-error: true
    timeout-minutes: 120
    env:
      # Why no `-Zmiri-strict-provenance`?
      #
      # Strict provenance rejects ALL integer-to-pointer casts
      # (including the official `with_exposed_provenance` escape
      # hatch).  That's fundamentally incompatible with tagged-
      # pointer value reps — every JIT and dynamic-language runtime
      # in existence (V8, JSC, CPython, MRI, BEAM) uses int↔ptr
      # round-trips for tag bits.
      #
      # Why `-Zmiri-ignore-leaks`?
      #
      # PR 2 ships `lispy-runtime` with a `Box::leak`-based "non-
      # collecting GC" — every `alloc_cons` / `alloc_closure` leaks
      # intentionally because the real collector lands in PR 4+
      # (LANG16 wiring).  Miri correctly reports these as leaks; we
      # tell it to ignore them so the runtime-UB checks (the
      # actually-valuable signal) aren't drowned out.  Once the GC
      # lands, this flag goes away and Miri starts enforcing the
      # no-leaks-after-collection invariant.
      #
      # Default Miri (without strict provenance) still catches all
      # the actually-exploitable UB classes:
      #   - out-of-bounds reads / writes
      #   - use-after-free
      #   - misaligned access
      #   - reads from uninitialized memory
      #   - data races
      #   - aliasing violations (Stacked / Tree Borrows)
      #
      # That's the bar we hold the substrate to.
      MIRIFLAGS: "-Zmiri-ignore-leaks"
      CARGO_INCREMENTAL: "0"
      RUST_BACKTRACE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly with Miri
        run: |
          rustup toolchain install nightly --component miri
          rustup +nightly component add rust-src
          cargo +nightly miri --version

      - name: Miri — twig-vm (full suite, may take 60-90 min)
        working-directory: code/packages/rust
        run: cargo +nightly miri test -p twig-vm --no-fail-fast

      # Belt-and-braces: also re-run the blocking suite on main
      # nightly, so a regression introduced by a merge that
      # bypassed CI (force-push, admin merge) shows up here.
      - name: Miri — lang-runtime-core
        working-directory: code/packages/rust
        run: cargo +nightly miri test -p lang-runtime-core --no-fail-fast

      - name: Miri — lispy-runtime
        working-directory: code/packages/rust
        run: cargo +nightly miri test -p lispy-runtime --no-fail-fast
