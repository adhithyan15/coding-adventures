[workspace]

[package]
name = "graph-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust weighted undirected graph crate"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
graph = { path = "../../rust/graph" }
serde_json = "1"
wasm-bindgen = "0.2"
