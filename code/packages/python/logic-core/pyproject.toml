[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-logic-core"
version = "0.4.0"
description = "Logic programming core: terms, unification, goals, search, disequality constraints, and extension slots"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = ["coding-adventures-symbol-core>=0.1.0"]
keywords = ["logic-programming", "prolog", "unification", "search", "education"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/LP02-disequality-constraints.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.uv.sources]
coding-adventures-symbol-core = { path = "../symbol-core", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["src/logic_core"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=logic_core --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/logic_core"]

[tool.coverage.report]
fail_under = 80
show_missing = true
