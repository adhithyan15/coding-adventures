[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-radix-tree"
version = "0.1.0"
description = "Radix tree (compressed trie / Patricia trie) — DT14"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
dependencies = ["coding-adventures-trie"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/radix_tree"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=radix_tree --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/radix_tree"]
