# This crate is intentionally NOT part of the Rust workspace because it
# depends on pyo3-ffi which requires Python development headers. Keeping
# it separate means `cargo build` in the workspace doesn't need Python.
[workspace]

[package]
name = "python-bridge"
version = "0.1.0"
edition = "2021"
description = "Thin safe Rust wrapper over Python's C API — no PyO3, no macros, no magic"

[dependencies]
pyo3-ffi = { version = "0.23", features = ["extension-module"] }
