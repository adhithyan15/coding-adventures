[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-sql-execution-engine"
version = "0.1.0"
description = "SQL execution engine — executes SELECT queries against pluggable data sources"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["sql", "execution-engine", "database", "education"]
dependencies = []

[tool.hatch.metadata]
allow-direct-references = true
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/sql_execution_engine"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = ["ANN401"]  # Allow Any in expression evaluator

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=sql_execution_engine --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/sql_execution_engine"]

[tool.coverage.report]
fail_under = 80
show_missing = true
