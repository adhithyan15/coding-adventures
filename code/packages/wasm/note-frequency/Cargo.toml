[workspace]

[package]
name = "note-frequency-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust note-frequency package"
license = "MIT"
readme = "README.md"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
note_frequency = { package = "coding-adventures-note-frequency", path = "../../rust/note-frequency" }
wasm-bindgen = "0.2"
