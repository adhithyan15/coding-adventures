# ================================================================
# CI — Incremental, parallel monorepo build with conditional toolchains
# ================================================================
#
# Two-job pipeline:
#   1. detect: Fast (~10s) — compiles the Go build tool and runs
#      --detect-languages to determine which toolchains are needed.
#   2. build: Installs only the needed toolchains, then runs the build.
#
# This saves 3-5 minutes on language-specific changes by skipping
# unneeded toolchain installations (e.g., Rust tarpaulin, Elixir/Erlang).
#
# Change detection: git diff against the base branch determines which
# files changed, maps them to packages, then uses the dependency graph
# to find all affected packages (changed + transitive dependents).
#
# Parallelism: independent packages run concurrently via goroutines.
#
# Tiered strategy:
# - Every push: Linux only (fast feedback)
# - PRs to main: Linux + macOS + Windows (thorough validation)

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Job 1: Detect which languages need toolchains ────────────
  #
  # This job is fast (~10s). It compiles the Go build tool, runs
  # --detect-languages, and outputs boolean flags for each language.
  # The build job reads these flags to conditionally install toolchains.
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      needs_python: ${{ steps.toolchains.outputs.needs_python }}
      needs_ruby: ${{ steps.toolchains.outputs.needs_ruby }}
      needs_go: ${{ steps.toolchains.outputs.needs_go }}
      needs_typescript: ${{ steps.toolchains.outputs.needs_typescript }}
      needs_rust: ${{ steps.toolchains.outputs.needs_rust }}
      needs_elixir: ${{ steps.toolchains.outputs.needs_elixir }}
      needs_lua: ${{ steps.toolchains.outputs.needs_lua }}
      needs_perl: ${{ steps.toolchains.outputs.needs_perl }}
      needs_dart: ${{ steps.toolchains.outputs.needs_dart }}
      needs_haskell: ${{ steps.toolchains.outputs.needs_haskell }}
      needs_dotnet: ${{ steps.toolchains.outputs.needs_dotnet }}
      needs_java: ${{ steps.toolchains.outputs.needs_java }}
      needs_kotlin: ${{ steps.toolchains.outputs.needs_kotlin }}
      needs_swift: ${{ steps.toolchains.outputs.needs_swift }}
      diff_base: ${{ steps.diff-base.outputs.base }}
      is_main: ${{ steps.detect-main.outputs.is_main }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Determine diff base
        id: diff-base
        shell: bash
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Validate the base ref before using it to prevent script injection.
            # Branch names may only contain alphanumerics, dots, hyphens, underscores,
            # and forward slashes — anything else is rejected.
            if [[ "$PR_BASE_REF" =~ ^[A-Za-z0-9_./-]+$ ]]; then
              BASE="origin/$PR_BASE_REF"
            else
              echo "::error::Unsafe base ref value: $PR_BASE_REF"
              exit 1
            fi
          elif [ "$GIT_REF" = "refs/heads/main" ]; then
            BASE="HEAD~1"
          else
            git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
            BASE="origin/main"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Diff base: $BASE"

      - name: Check if main branch
        id: detect-main
        shell: bash
        env:
          GIT_REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$GIT_REF" = "refs/heads/main" ] && [ "$EVENT_NAME" = "push" ]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect needed languages and emit build plan
        id: detect
        shell: bash
        run: |
          cd code/programs/go/build-tool
          go build -o ../../../../build-tool .
          cd ../../../..
          ./build-tool \
            -root . \
            -diff-base "${{ steps.diff-base.outputs.base }}" \
            -validate-build-files \
            -detect-languages \
            -emit-plan build-plan.json

      - name: Normalize toolchain requirements
        id: toolchains
        shell: bash
        run: |
          if [ "${{ steps.detect-main.outputs.is_main }}" = "true" ]; then
            echo "Main branch push detected; enabling all supported toolchains for the forced full build"
            printf '%s\n' \
              'needs_python=true' \
              'needs_ruby=true' \
              'needs_go=true' \
              'needs_typescript=true' \
              'needs_rust=true' \
              'needs_elixir=true' \
              'needs_lua=true' \
              'needs_perl=true' \
              'needs_dart=true' \
              'needs_haskell=true' \
              'needs_dotnet=true' >> "$GITHUB_OUTPUT"
            printf '%s\n' \
              'needs_java=true' \
              'needs_kotlin=true' >> "$GITHUB_OUTPUT"
            printf '%s\n' \
              'needs_swift=true' >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' \
              'needs_python=${{ steps.detect.outputs.needs_python }}' \
              'needs_ruby=${{ steps.detect.outputs.needs_ruby }}' \
              'needs_go=${{ steps.detect.outputs.needs_go }}' \
              'needs_typescript=${{ steps.detect.outputs.needs_typescript }}' \
              'needs_rust=${{ steps.detect.outputs.needs_rust }}' \
              'needs_elixir=${{ steps.detect.outputs.needs_elixir }}' \
              'needs_lua=${{ steps.detect.outputs.needs_lua }}' \
              'needs_perl=${{ steps.detect.outputs.needs_perl }}' \
              'needs_dart=${{ steps.detect.outputs.needs_dart }}' \
              'needs_haskell=${{ steps.detect.outputs.needs_haskell }}' \
              'needs_dotnet=${{ steps.detect.outputs.needs_dotnet }}' >> "$GITHUB_OUTPUT"
            printf '%s\n' \
              'needs_java=${{ steps.detect.outputs.needs_java }}' \
              'needs_kotlin=${{ steps.detect.outputs.needs_kotlin }}' >> "$GITHUB_OUTPUT"
            printf '%s\n' \
              'needs_swift=${{ steps.detect.outputs.needs_swift }}' >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build plan
        uses: actions/upload-artifact@v4
        with:
          name: build-plan
          path: build-plan.json
          retention-days: 1

  # ── Job 2: Build and test ──────────────────────────────────────
  #
  # Installs only the toolchains flagged by the detect job, then
  # compiles the build tool and runs the incremental build.
  build:
    needs: detect
    strategy:
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
      fail-fast: false
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Language toolchains (conditional) ───────────────────────
      #
      # Go is always installed — the build tool is written in Go.
      # Other toolchains are installed only if their language has
      # affected packages, as determined by the detect job.

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Python
        if: needs.detect.outputs.needs_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          allow-prereleases: true

      - name: Install uv
        if: needs.detect.outputs.needs_python == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.x"

      # ── Lua must be set up BEFORE Ruby on Windows ──────────────
      #
      # Ruby's MSYS2 ships its own `link.exe` which shadows the MSVC
      # linker that Lua needs to compile. By installing MSVC + Lua
      # first, the MSVC `link.exe` is in PATH before Ruby's MSYS2.

      - name: Set up MSVC (required for Lua on Windows)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Lua
        if: needs.detect.outputs.needs_lua == 'true'
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks (Unix)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os != 'Windows'
        uses: leafo/gh-actions-luarocks@v4

      - name: Set up LuaRocks (Windows)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os == 'Windows'
        shell: cmd
        run: |
          curl -L -o luarocks.zip https://luarocks.github.io/luarocks/releases/luarocks-3.11.1-windows-64.zip
          powershell -Command "Expand-Archive -Path luarocks.zip -DestinationPath luarocks-install"
          cd luarocks-install\luarocks-3.11.1-windows-64
          echo %CD%>> %GITHUB_PATH%

      - name: Install Lua test tools (Unix)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          curl -L --fail https://luarocks.org/manifests/hoelzro/lua-term-0.8-1.rockspec -o "$tmpdir/lua-term-0.8-1.rockspec"
          sed -i.bak 's|archive/0\.08\.tar\.gz|archive/refs/tags/0.08.tar.gz|' "$tmpdir/lua-term-0.8-1.rockspec"
          luarocks install "$tmpdir/lua-term-0.8-1.rockspec"
          rm -rf "$tmpdir"
          luarocks install busted
          luarocks install luacov
          luarocks install luacheck
          luarocks install luasocket 2>/dev/null || true

      - name: Install Lua test tools (Windows)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          luarocks install busted
          luarocks install luacov
          luarocks install luacheck
          for /f "delims=" %%i in ('luarocks path --lr-bin') do echo %%i>> %GITHUB_PATH%

      - name: Set up Ruby
        if: needs.detect.outputs.needs_ruby == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - name: Install bundler
        if: needs.detect.outputs.needs_ruby == 'true'
        shell: bash
        run: gem install bundler

      - name: Set up Node.js
        if: needs.detect.outputs.needs_typescript == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        if: needs.detect.outputs.needs_rust == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        if: needs.detect.outputs.needs_rust == 'true' && runner.os == 'Linux'
        run: cargo install cargo-tarpaulin

      - name: Set up Elixir
        if: needs.detect.outputs.needs_elixir == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26.0'

      - name: Set up Dart
        if: needs.detect.outputs.needs_dart == 'true'
        uses: dart-lang/setup-dart@v1

      - name: Set up Swift (Windows)
        if: needs.detect.outputs.needs_swift == 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          winget install --id Swift.Toolchain --exact --accept-package-agreements --accept-source-agreements --source winget
          $wingetExitCode = $LASTEXITCODE

          if ($wingetExitCode -ne 0) {
            Write-Warning "winget install exited with code $wingetExitCode; checking whether Swift is available anyway"
          }

          $currentPathEntries = @($env:Path -split ';')
          $currentPathSet = @{}
          foreach ($entry in $currentPathEntries) {
            if (-not [string]::IsNullOrWhiteSpace($entry)) {
              $currentPathSet[$entry] = $true
            }
          }

          $registryPathEntries = @(
            [System.Environment]::GetEnvironmentVariable('Path', 'User')
            [System.Environment]::GetEnvironmentVariable('Path', 'Machine')
          ) | Where-Object { $_ } | ForEach-Object { $_ -split ';' } | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }

          $newPathEntries = @()
          foreach ($entry in $registryPathEntries) {
            if (-not $currentPathSet.ContainsKey($entry)) {
              $currentPathSet[$entry] = $true
              $newPathEntries += $entry
            }
          }

          foreach ($entry in $newPathEntries) {
            $entry | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          if ($newPathEntries.Count -gt 0) {
            $env:Path = "$env:Path;$($newPathEntries -join ';')"
          }

          $swiftRoots = @(
            (Join-Path $env:LOCALAPPDATA 'Programs\Swift')
            (Join-Path $env:ProgramFiles 'Swift')
          ) | Where-Object { Test-Path $_ }

          $swiftExe = @(
            (Get-Command swift -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -ErrorAction SilentlyContinue)
            ($swiftRoots | ForEach-Object {
              Get-ChildItem -Path $_ -Filter swift.exe -Recurse -File -ErrorAction SilentlyContinue |
                Sort-Object FullName -Descending |
                Select-Object -First 1 -ExpandProperty FullName
            })
          ) | Where-Object { $_ } | Select-Object -First 1

          if (-not $swiftExe) {
            if ($wingetExitCode -ne 0) {
              throw "winget install exited with code $wingetExitCode and swift.exe was not found"
            }
            throw 'swift.exe not found after winget install'
          }

          $toolchainBin = Split-Path -Parent $swiftExe
          if (-not $currentPathSet.ContainsKey($toolchainBin)) {
            $toolchainBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            $env:Path = "$env:Path;$toolchainBin"
            $currentPathSet[$toolchainBin] = $true
          }
          Write-Host "Using Swift from $swiftExe"

          $sdkRoot = [System.Environment]::GetEnvironmentVariable('SDKROOT', 'User')
          if (-not $sdkRoot) {
            $sdkRoot = [System.Environment]::GetEnvironmentVariable('SDKROOT', 'Machine')
          }
          if (-not $sdkRoot) {
            $sdkRoot = $swiftRoots | ForEach-Object {
            Get-ChildItem -Path $_ -Filter Windows.sdk -Directory -Recurse -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
            } | Where-Object { $_ } | Select-Object -First 1
          }

          if ($sdkRoot) {
            "SDKROOT=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $env:SDKROOT = $sdkRoot
            Write-Host "Using SDKROOT=$sdkRoot"
          }

          where.exe swift

      # ── Java / Kotlin ──────────────────────────────────────────
      #
      # Both Java and Kotlin packages use Gradle and JDK 21.
      # A single JDK + Gradle setup covers both languages since
      # Kotlin/JVM runs on the same JVM.

      - name: Set up JDK 21
        if: needs.detect.outputs.needs_java == 'true' || needs.detect.outputs.needs_kotlin == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        if: needs.detect.outputs.needs_java == 'true' || needs.detect.outputs.needs_kotlin == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Disable long-lived Gradle services on Windows CI
        if: (needs.detect.outputs.needs_java == 'true' || needs.detect.outputs.needs_kotlin == 'true') && runner.os == 'Windows'
        shell: bash
        run: |
          {
            echo 'GRADLE_OPTS=-Dorg.gradle.daemon=false -Dorg.gradle.vfs.watch=false'
          } >> "$GITHUB_ENV"

      - name: Install cpanm and test dependencies (Perl)
        if: needs.detect.outputs.needs_perl == 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y cpanminus
            # Pre-install Test2::V0 to the system Perl location (requires sudo).
            # Without sudo, cpanm falls back to ~/perl5 which prove cannot find.
            sudo cpanm --quiet --notest Test2::V0
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cpanminus
            cpanm --quiet --notest Test2::V0
          fi

      - name: Set up Haskell
        if: needs.detect.outputs.needs_haskell == 'true'
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4'
          cabal-version: '3.10'

      - name: Set up .NET
        if: needs.detect.outputs.needs_dotnet == 'true'
        uses: actions/setup-dotnet@v4
        with:
          # .NET 9 is the current LTS release. No platform exclusions needed —
          # actions/setup-dotnet@v4 works identically on Ubuntu, macOS, and Windows.
          dotnet-version: '9.0.x'

      - name: Install test runners
        shell: bash
        run: |
          if [ "${{ needs.detect.outputs.needs_python }}" = "true" ]; then
            uv pip install --system pytest
          fi
          if [ "${{ needs.detect.outputs.needs_typescript }}" = "true" ]; then
            npm install -g jest
          fi

      # ── Verify toolchains ────────────────────────────────────
      - name: Verify tools
        shell: bash
        run: |
          echo "Go: $(go version)"
          if [ "${{ needs.detect.outputs.needs_python }}" = "true" ]; then
            echo "Python: $(python --version)"
            echo "uv: $(uv --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_ruby }}" = "true" ]; then
            echo "Ruby: $(ruby --version)"
            echo "Bundler: $(bundle --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_typescript }}" = "true" ]; then
            echo "Node: $(node --version)"
            echo "npm: $(npm --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_rust }}" = "true" ]; then
            echo "Rust: $(rustc --version)"
            echo "Cargo: $(cargo --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_swift }}" = "true" ]; then
            echo "Swift: $(swift --version | head -1)"
          fi
          if [ "${{ needs.detect.outputs.needs_elixir }}" = "true" ]; then
            echo "Elixir: $(elixir --version)"
            echo "Mix: $(mix --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_dart }}" = "true" ]; then
            echo "Dart: $(dart --version 2>&1)"
          fi
          if [ "${{ needs.detect.outputs.needs_lua }}" = "true" ]; then
            echo "Lua: $(lua -v)"
            echo "LuaRocks: $(luarocks --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_perl }}" = "true" ] && [ "$RUNNER_OS" != "Windows" ]; then
            echo "Perl: $(perl --version | head -2 | tail -1)"
            echo "cpanm: $(cpanm --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_haskell }}" = "true" ]; then
            echo "GHC: $(ghc --version)"
            echo "Cabal: $(cabal --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_dotnet }}" = "true" ]; then
            echo ".NET: $(dotnet --version)"
          fi

      # ── Download build plan (skip discovery in build job) ─────
      - name: Download build plan
        uses: actions/download-artifact@v4
        with:
          name: build-plan
        continue-on-error: true

      # ── Build the build tool ──────────────────────────────────
      - name: Compile build tool
        shell: bash
        run: |
          cd code/programs/go/build-tool
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -o ../../../../build-tool.exe .
          else
            go build -o ../../../../build-tool .
          fi

      # ── Fix Windows linker conflict: remove Ruby MSYS2's 'link' ────
      #
      # Ruby's setup-ruby installs MSYS2 which puts a GNU 'link' binary at
      # C:\hostedtoolcache\windows\Ruby\<ver>\x64\msys64\usr\bin\link.exe.
      # This is a GNU hard-link utility (unrelated to linking object files) that
      # shadows MSVC's link.exe via PATH, causing ALL Rust packages (wasm/,
      # ruby/*_native) to fail with "extra operand" linker errors.
      #
      # Fix: delete the file using PowerShell (not bash/find). Bash via MSYS2
      # cannot reliably delete Windows files — the 'find -delete' step printed
      # success but left the file intact due to MSYS2 filesystem translation.
      # PowerShell uses native Windows I/O and removes it correctly.
      #
      # We keep the rest of MSYS2 intact: msys64/mingw64/bin has gcc.exe and
      # ld.exe that Ruby native Rust extensions need for the MinGW toolchain.
      - name: Fix linker conflict on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem "C:\hostedtoolcache\windows\Ruby" -Recurse -Filter "link.exe" |
            Where-Object { $_.FullName -like "*msys64\usr\bin*" } |
            Remove-Item -Force
          Write-Host "Removed Ruby MSYS2 link.exe to prevent shadowing MSVC linker"

      - name: Build and test affected Swift packages on Windows
        if: runner.os == 'Windows' && needs.detect.outputs.needs_swift == 'true'
        shell: pwsh
        run: |
          $planFlag = @()
          if (Test-Path 'build-plan.json') {
            Write-Host 'Using pre-computed build plan'
            $planFlag = @('-plan-file', 'build-plan.json')
          }
          & ./build-tool.exe -root . @planFlag -validate-build-files -language swift

      # ── Run the build ─────────────────────────────────────────
      - name: Build and test affected packages
        if: runner.os != 'Windows' || (needs.detect.outputs.needs_swift == 'true' && false)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          PLAN_FLAG=""
          if [ -f build-plan.json ]; then
            PLAN_FLAG="-plan-file build-plan.json"
            echo "Using pre-computed build plan"
          fi
          $BT \
            -root . \
            $PLAN_FLAG \
            -validate-build-files \
            -language all

      # ── Force full build on main ──────────────────────────────
      - name: Full build on main merge
        if: needs.detect.outputs.is_main == 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          $BT -root . -force -validate-build-files -language all
