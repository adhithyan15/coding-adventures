[package]
name = "gfm"
version = "0.1.0"
edition = "2021"
description = "GFM 0.31.2 Markdown pipeline — parse Markdown to HTML in one call"

[dependencies]
gfm-parser = { path = "../gfm-parser" }
document-ast-to-html = { path = "../document-ast-to-html" }
document-ast = { path = "../document-ast" }

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
