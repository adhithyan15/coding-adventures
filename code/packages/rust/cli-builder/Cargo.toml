[package]
name = "cli-builder"
version = "0.1.0"
edition = "2021"
description = "Declarative CLI parsing via directed graphs and state machines — one JSON spec drives argument parsing, help generation, and error reporting"

[dependencies]
directed-graph = { path = "../directed-graph" }
state-machine = { path = "../state-machine" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
