[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-nib-clr-compiler"
version = "0.1.0"
description = "End-to-end Nib to CLR assembly compiler"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-cli-assembly-writer",
    "coding-adventures-clr-pe-file",
    "coding-adventures-clr-vm-simulator",
    "coding-adventures-ir-optimizer",
    "coding-adventures-ir-to-cil-bytecode",
    "coding-adventures-nib-ir-compiler",
    "coding-adventures-nib-parser",
    "coding-adventures-nib-type-checker",
]

[tool.uv.sources]
coding-adventures-cil-bytecode-builder = { path = "../cil-bytecode-builder", editable = true }
coding-adventures-cli-assembly-writer = { path = "../cli-assembly-writer", editable = true }
coding-adventures-cli-runtime-model = { path = "../cli-runtime-model", editable = true }
coding-adventures-clr-bytecode-disassembler = { path = "../clr-bytecode-disassembler", editable = true }
coding-adventures-clr-pe-file = { path = "../clr-pe-file", editable = true }
coding-adventures-clr-vm-simulator = { path = "../clr-vm-simulator", editable = true }
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-compiler-source-map = { path = "../compiler-source-map", editable = true }
coding-adventures-directed-graph = { path = "../directed-graph", editable = true }
coding-adventures-grammar-tools = { path = "../grammar-tools", editable = true }
coding-adventures-graph = { path = "../graph", editable = true }
coding-adventures-ir-optimizer = { path = "../ir-optimizer", editable = true }
coding-adventures-ir-to-cil-bytecode = { path = "../ir-to-cil-bytecode", editable = true }
coding-adventures-lexer = { path = "../lexer", editable = true }
coding-adventures-nib-ir-compiler = { path = "../nib-ir-compiler", editable = true }
coding-adventures-nib-lexer = { path = "../nib-lexer", editable = true }
coding-adventures-nib-parser = { path = "../nib-parser", editable = true }
coding-adventures-nib-type-checker = { path = "../nib-type-checker", editable = true }
coding-adventures-parser = { path = "../parser", editable = true }
coding-adventures-state-machine = { path = "../state-machine", editable = true }
coding-adventures-type-checker-protocol = { path = "../type-checker-protocol", editable = true }

[project.optional-dependencies]
dev = [
    "coding-adventures-cil-bytecode-builder",
    "coding-adventures-cli-runtime-model",
    "coding-adventures-clr-bytecode-disassembler",
    "coding-adventures-compiler-ir",
    "coding-adventures-compiler-source-map",
    "coding-adventures-directed-graph",
    "coding-adventures-grammar-tools",
    "coding-adventures-graph",
    "coding-adventures-lexer",
    "coding-adventures-nib-lexer",
    "coding-adventures-parser",
    "coding-adventures-state-machine",
    "coding-adventures-type-checker-protocol",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nib_clr_compiler"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=nib_clr_compiler --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/nib_clr_compiler"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = [
    "cli_assembly_writer",
    "clr_pe_file",
    "clr_vm_simulator",
    "ir_optimizer",
    "ir_to_cil_bytecode",
    "nib_ir_compiler",
    "nib_parser",
    "nib_type_checker",
]
ignore_missing_imports = true
