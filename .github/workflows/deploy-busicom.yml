# ================================================================
# Deploy Busicom 141-PF Calculator to GitHub Pages
# ================================================================
#
# Builds the Vite app and deploys it to the gh-pages branch
# under the busicom/ subdirectory, preserving any other content
# already on GitHub Pages.
#
# Pages is configured to serve from the gh-pages branch (legacy mode).
# The peaceiris action pushes built assets into busicom/ on that branch,
# so the app is available at:
#   https://<user>.github.io/coding-adventures/busicom/
#
# The Vite base path is set to /coding-adventures/busicom/ in
# vite.config.ts so all asset URLs resolve correctly.

name: Deploy Busicom Calculator

on:
  push:
    branches: [main]
    paths:
      - "code/programs/typescript/busicom-calculator/**"
      - "code/packages/typescript/**"
      - ".github/workflows/deploy-busicom.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (packages)
        run: |
          cd code/packages/typescript/transistors && npm install
          cd ../logic-gates && npm install
          cd ../arithmetic && npm install
          cd ../clock && npm install
          cd ../intel4004-gatelevel && npm install

      - name: Install dependencies (app)
        run: |
          cd code/programs/typescript/busicom-calculator
          npm install

      - name: Build
        run: |
          cd code/programs/typescript/busicom-calculator
          npm run build

      - name: Deploy to GitHub Pages (busicom/ subdirectory)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: code/programs/typescript/busicom-calculator/dist
          destination_dir: busicom
          keep_files: true
