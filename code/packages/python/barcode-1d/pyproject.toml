[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-barcode-1d"
version = "0.1.0"
description = "High-level 1D barcode pipeline for Python"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-codabar",
    "coding-adventures-code128",
    "coding-adventures-code39",
    "coding-adventures-ean-13",
    "coding-adventures-itf",
    "coding-adventures-pixel_container",
    "coding-adventures-upc-a",
]

[project.optional-dependencies]
native = [
    "coding-adventures-paint-vm-metal-native",
    "coding-adventures-paint-codec-png-native",
]
dev = ["pytest>=8.0", "pytest-cov>=5.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/barcode_1d"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=barcode_1d --cov-report=term-missing --cov-fail-under=80"
