[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-ir-to-jvm-class-file"
version = "0.1.0"
description = "Prototype backend lowering compiler-ir programs to JVM class files"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["compiler", "ir", "jvm", "class-file", "graalvm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Software Development :: Compilers",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]
dependencies = [
    "coding-adventures-compiler-ir",
    "coding-adventures-jvm-class-file",
]

[tool.uv.sources]
coding-adventures-brainfuck = { path = "../brainfuck", editable = true }
coding-adventures-brainfuck-ir-compiler = { path = "../brainfuck-ir-compiler", editable = true }
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-compiler-source-map = { path = "../compiler-source-map", editable = true }
coding-adventures-directed-graph = { path = "../directed-graph", editable = true }
coding-adventures-grammar-tools = { path = "../grammar-tools", editable = true }
coding-adventures-graph = { path = "../graph", editable = true }
coding-adventures-jvm-class-file = { path = "../jvm-class-file", editable = true }
coding-adventures-lexer = { path = "../lexer", editable = true }
coding-adventures-nib-ir-compiler = { path = "../nib-ir-compiler", editable = true }
coding-adventures-nib-lexer = { path = "../nib-lexer", editable = true }
coding-adventures-nib-parser = { path = "../nib-parser", editable = true }
coding-adventures-nib-type-checker = { path = "../nib-type-checker", editable = true }
coding-adventures-parser = { path = "../parser", editable = true }
coding-adventures-state-machine = { path = "../state-machine", editable = true }
coding-adventures-type-checker-protocol = { path = "../type-checker-protocol", editable = true }
coding-adventures-virtual-machine = { path = "../virtual-machine", editable = true }

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/04g-ir-to-jvm-class-file.md"

[project.optional-dependencies]
dev = [
    "coding-adventures-brainfuck",
    "coding-adventures-brainfuck-ir-compiler",
    "coding-adventures-compiler-source-map",
    "coding-adventures-directed-graph",
    "coding-adventures-grammar-tools",
    "coding-adventures-graph",
    "coding-adventures-lexer",
    "coding-adventures-nib-ir-compiler",
    "coding-adventures-nib-lexer",
    "coding-adventures-nib-parser",
    "coding-adventures-nib-type-checker",
    "coding-adventures-parser",
    "coding-adventures-state-machine",
    "coding-adventures-type-checker-protocol",
    "coding-adventures-virtual-machine",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ir_to_jvm_class_file"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=ir_to_jvm_class_file --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/ir_to_jvm_class_file"]

[tool.coverage.report]
fail_under = 80
show_missing = true
