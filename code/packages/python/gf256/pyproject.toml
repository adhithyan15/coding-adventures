[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-gf256"
version = "0.1.0"
description = "Galois Field GF(2^8) arithmetic — log/antilog table implementation"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4"]

[tool.hatch.build.targets.wheel]
packages = ["src/gf256"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=gf256 --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/gf256"]

[tool.coverage.report]
fail_under = 80
show_missing = true
