# ================================================================
# CodeQL Code Scanning
# ================================================================
#
# Replaces GitHub's default CodeQL setup so we can control build
# modes per language. The default auto-setup tried to auto-build
# Swift and failed because the repo contains both an Xcode project
# (01-hello-world, which needs signing) and multiple standalone SPM
# packages (logic_gates, transistors) with no common root workspace.
#
# Build mode decisions per language:
#
#   javascript-typescript — build-mode: none
#     TypeScript/JS is interpreted; no compilation needed for CodeQL.
#
#   python — build-mode: none
#     Python is interpreted; no build step needed.
#
#   ruby — build-mode: none
#     Ruby is interpreted; no build step needed.
#
#   go — build-mode: autobuild
#     The Go build tool lives in a standard module layout; autobuild
#     finds and compiles it without any extra config.
#
#   swift — build-mode: manual
#     CodeQL 2.25.1 does NOT support build-mode: none for Swift
#     (only autobuild and manual are accepted). We use manual so we
#     can selectively run `swift build` on just the SPM packages,
#     skipping the Xcode project which requires code-signing.
#
# Rust is NOT listed — CodeQL has no Rust extractor yet.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan at 03:17 UTC on Mondays
    - cron: "17 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # ── Non-Swift languages (ubuntu, build-mode matrix) ─────────────────
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: ruby
            build-mode: none
          - language: go
            build-mode: autobuild

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Only runs when build-mode is autobuild (i.e. Go).
      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ── Swift (macos-latest, manual build of SPM packages only) ─────────
  #
  # Kept as a separate job because:
  #   1. Swift requires a macOS runner (no Linux Swift toolchain on GH).
  #   2. build-mode: manual needs explicit build steps that differ from
  #      all other languages — mixing it into the matrix would require
  #      conditionals on every step, making the workflow harder to read.
  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      # Build each SPM package so CodeQL can trace the compilation.
      # The Xcode project (01-hello-world) is intentionally skipped
      # because it requires code-signing which is unavailable in CI.
      - name: Build Swift SPM packages
        run: |
          swift build --package-path code/packages/swift/transistors
          swift build --package-path code/packages/swift/logic_gates

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:swift
