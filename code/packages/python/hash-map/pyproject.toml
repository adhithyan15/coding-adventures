[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-hash-map"
version = "0.1.0"
description = "Hash map with chaining and open-addressing strategies — DT18"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
dependencies = ["coding-adventures-hash-functions"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/hash_map"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=hash_map --cov-report=term-missing --cov-fail-under=95"

[tool.coverage.run]
source = ["src/hash_map"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
