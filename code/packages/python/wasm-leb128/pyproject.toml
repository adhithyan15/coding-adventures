[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-wasm-leb128"
version = "0.1.0"
description = "LEB128 variable-length integer encoding for WASM binary format"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/wasm_leb128"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=wasm_leb128 --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
omit = ["*/*_tokens.py", "*/*_grammar.py"]
source = ["src/wasm_leb128"]

[tool.coverage.report]
fail_under = 80
show_missing = true
