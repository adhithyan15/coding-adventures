[project]
name = "coding-adventures-ml-framework-keras"
version = "0.1.0"
description = "Keras 3-compatible high-level API built on ml-framework-core"
requires-python = ">=3.12"
dependencies = ["coding-adventures-ml-framework-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ml_framework_keras"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
src = ["src", "tests"]
