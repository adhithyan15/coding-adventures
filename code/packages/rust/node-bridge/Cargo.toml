# Zero dependencies. We declare Node.js N-API functions ourselves using
# extern "C" — no napi-sys, no napi-rs, no bindgen, no build-time headers.
# N-API is ABI-stable by design (that's its entire purpose).

[package]
name = "node-bridge"
version = "0.1.0"
edition = "2021"
description = "Thin safe Rust wrapper over Node.js N-API — zero dependencies, no napi-rs, no macros"
build = "build.rs"

[dependencies]
# None. That's the point.
