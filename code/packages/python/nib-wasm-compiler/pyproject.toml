[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-nib-wasm-compiler"
version = "0.1.0"
description = "End-to-end Nib to WASM compiler"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-ir-optimizer",
    "coding-adventures-nib-parser",
    "coding-adventures-nib-type-checker",
    "coding-adventures-nib-ir-compiler",
    "coding-adventures-ir-to-wasm-validator",
    "coding-adventures-ir-to-wasm-assembly",
    "coding-adventures-wasm-assembler",
    "coding-adventures-wasm-validator",
]

[tool.uv.sources]
coding-adventures-ir-optimizer = { path = "../ir-optimizer", editable = true }
coding-adventures-nib-parser = { path = "../nib-parser", editable = true }
coding-adventures-nib-type-checker = { path = "../nib-type-checker", editable = true }
coding-adventures-nib-ir-compiler = { path = "../nib-ir-compiler", editable = true }
coding-adventures-ir-to-wasm-validator = { path = "../ir-to-wasm-validator", editable = true }
coding-adventures-ir-to-wasm-assembly = { path = "../ir-to-wasm-assembly", editable = true }
coding-adventures-wasm-assembler = { path = "../wasm-assembler", editable = true }
coding-adventures-wasm-validator = { path = "../wasm-validator", editable = true }
coding-adventures-wasm-runtime = { path = "../wasm-runtime", editable = true }

[project.optional-dependencies]
dev = [
    "coding-adventures-wasm-runtime",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["src/nib_wasm_compiler"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=nib_wasm_compiler --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/nib_wasm_compiler"]

[tool.coverage.report]
fail_under = 80
show_missing = true
