# ================================================================
# CI — Incremental, parallel monorepo build with conditional toolchains
# ================================================================
#
# Two-job pipeline:
#   1. detect: Fast (~10s) — compiles the Go build tool and runs
#      --detect-languages to determine which toolchains are needed.
#   2. build: Installs only the needed toolchains, then runs the build.
#
# This saves 3-5 minutes on language-specific changes by skipping
# unneeded toolchain installations (e.g., Rust tarpaulin, Elixir/Erlang).
#
# Change detection: git diff against the base branch determines which
# files changed, maps them to packages, then uses the dependency graph
# to find all affected packages (changed + transitive dependents).
#
# Parallelism: independent packages run concurrently via goroutines.
#
# Tiered strategy:
# - Every push: Linux only (fast feedback)
# - PRs to main: Linux + macOS + Windows (thorough validation)

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Detect which languages need toolchains ────────────
  #
  # This job is fast (~10s). It compiles the Go build tool, runs
  # --detect-languages, and outputs boolean flags for each language.
  # The build job reads these flags to conditionally install toolchains.
  detect:
    runs-on: ubuntu-latest
    outputs:
      needs_python: ${{ steps.detect.outputs.needs_python }}
      needs_ruby: ${{ steps.detect.outputs.needs_ruby }}
      needs_go: ${{ steps.detect.outputs.needs_go }}
      needs_typescript: ${{ steps.detect.outputs.needs_typescript }}
      needs_rust: ${{ steps.detect.outputs.needs_rust }}
      needs_elixir: ${{ steps.detect.outputs.needs_elixir }}
      needs_lua: ${{ steps.detect.outputs.needs_lua }}
      needs_perl: ${{ steps.detect.outputs.needs_perl }}
      needs_java: ${{ steps.detect.outputs.needs_java }}
      needs_kotlin: ${{ steps.detect.outputs.needs_kotlin }}
      diff_base: ${{ steps.diff-base.outputs.base }}
      is_main: ${{ steps.detect-main.outputs.is_main }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Determine diff base
        id: diff-base
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            BASE="HEAD~1"
          else
            git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
            BASE="origin/main"
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Diff base: $BASE"

      - name: Check if main branch
        id: detect-main
        shell: bash
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.event_name }}" = "push" ]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect needed languages and emit build plan
        id: detect
        shell: bash
        run: |
          cd code/programs/go/build-tool
          go build -o ../../../../build-tool .
          cd ../../../..
          ./build-tool \
            -root . \
            -diff-base "${{ steps.diff-base.outputs.base }}" \
            -validate-build-files \
            -detect-languages \
            -emit-plan build-plan.json

      - name: Upload build plan
        uses: actions/upload-artifact@v4
        with:
          name: build-plan
          path: build-plan.json
          retention-days: 1

  # ── Job 2: Build and test ──────────────────────────────────────
  #
  # Installs only the toolchains flagged by the detect job, then
  # compiles the build tool and runs the incremental build.
  build:
    needs: detect
    strategy:
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
      fail-fast: false
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Language toolchains (conditional) ───────────────────────
      #
      # Go is always installed — the build tool is written in Go.
      # Other toolchains are installed only if their language has
      # affected packages, as determined by the detect job.

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Python
        if: needs.detect.outputs.needs_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          allow-prereleases: true

      - name: Install uv
        if: needs.detect.outputs.needs_python == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.x"

      # ── Lua must be set up BEFORE Ruby on Windows ──────────────
      #
      # Ruby's MSYS2 ships its own `link.exe` which shadows the MSVC
      # linker that Lua needs to compile. By installing MSVC + Lua
      # first, the MSVC `link.exe` is in PATH before Ruby's MSYS2.

      - name: Set up MSVC (required for Lua on Windows)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Lua
        if: needs.detect.outputs.needs_lua == 'true'
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks (Unix)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os != 'Windows'
        uses: leafo/gh-actions-luarocks@v4

      - name: Set up LuaRocks (Windows)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os == 'Windows'
        shell: cmd
        run: |
          curl -L -o luarocks.zip https://luarocks.github.io/luarocks/releases/luarocks-3.11.1-windows-64.zip
          powershell -Command "Expand-Archive -Path luarocks.zip -DestinationPath luarocks-install"
          cd luarocks-install\luarocks-3.11.1-windows-64
          echo %CD%>> %GITHUB_PATH%

      - name: Install Lua test tools (Unix)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          luarocks install busted
          luarocks install luacov
          luarocks install luacheck

      - name: Install Lua test tools (Windows)
        if: needs.detect.outputs.needs_lua == 'true' && runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          luarocks install busted
          luarocks install luacov
          luarocks install luacheck
          for /f "delims=" %%i in ('luarocks path --lr-bin') do echo %%i>> %GITHUB_PATH%

      - name: Set up Ruby
        if: needs.detect.outputs.needs_ruby == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: false

      - name: Install bundler
        if: needs.detect.outputs.needs_ruby == 'true'
        shell: bash
        run: gem install bundler

      - name: Set up Node.js
        if: needs.detect.outputs.needs_typescript == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        if: needs.detect.outputs.needs_rust == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tarpaulin
        if: needs.detect.outputs.needs_rust == 'true' && runner.os == 'Linux'
        run: cargo install cargo-tarpaulin

      - name: Set up Elixir
        if: needs.detect.outputs.needs_elixir == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.16'
          otp-version: '26.0'

      # ── Java / Kotlin ──────────────────────────────────────────
      #
      # Both Java and Kotlin packages use Gradle and JDK 21.
      # A single JDK + Gradle setup covers both languages since
      # Kotlin/JVM runs on the same JVM.

      - name: Set up JDK 21
        if: needs.detect.outputs.needs_java == 'true' || needs.detect.outputs.needs_kotlin == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        if: needs.detect.outputs.needs_java == 'true' || needs.detect.outputs.needs_kotlin == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Install cpanm and test dependencies (Perl)
        if: needs.detect.outputs.needs_perl == 'true' && runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y cpanminus
            # Pre-install Test2::V0 to the system Perl location (requires sudo).
            # Without sudo, cpanm falls back to ~/perl5 which prove cannot find.
            sudo cpanm --quiet --notest Test2::V0
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cpanminus
            cpanm --quiet --notest Test2::V0
          fi

      - name: Install test runners
        shell: bash
        run: |
          if [ "${{ needs.detect.outputs.needs_python }}" = "true" ]; then
            uv pip install --system pytest
          fi
          if [ "${{ needs.detect.outputs.needs_typescript }}" = "true" ]; then
            npm install -g jest
          fi

      # ── Verify toolchains ────────────────────────────────────
      - name: Verify tools
        shell: bash
        run: |
          echo "Go: $(go version)"
          if [ "${{ needs.detect.outputs.needs_python }}" = "true" ]; then
            echo "Python: $(python --version)"
            echo "uv: $(uv --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_ruby }}" = "true" ]; then
            echo "Ruby: $(ruby --version)"
            echo "Bundler: $(bundle --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_typescript }}" = "true" ]; then
            echo "Node: $(node --version)"
            echo "npm: $(npm --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_rust }}" = "true" ]; then
            echo "Rust: $(rustc --version)"
            echo "Cargo: $(cargo --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_elixir }}" = "true" ]; then
            echo "Elixir: $(elixir --version)"
            echo "Mix: $(mix --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_lua }}" = "true" ]; then
            echo "Lua: $(lua -v)"
            echo "LuaRocks: $(luarocks --version)"
          fi
          if [ "${{ needs.detect.outputs.needs_perl }}" = "true" ] && [ "$RUNNER_OS" != "Windows" ]; then
            echo "Perl: $(perl --version | head -2 | tail -1)"
            echo "cpanm: $(cpanm --version)"
          fi

      # ── Download build plan (skip discovery in build job) ─────
      - name: Download build plan
        uses: actions/download-artifact@v4
        with:
          name: build-plan
        continue-on-error: true

      # ── Build the build tool ──────────────────────────────────
      - name: Compile build tool
        shell: bash
        run: |
          cd code/programs/go/build-tool
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -o ../../../../build-tool.exe .
          else
            go build -o ../../../../build-tool .
          fi

      # ── Run the build ─────────────────────────────────────────
      - name: Build and test affected packages
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          PLAN_FLAG=""
          if [ -f build-plan.json ]; then
            PLAN_FLAG="-plan-file build-plan.json"
            echo "Using pre-computed build plan"
          fi
          $BT \
            -root . \
            $PLAN_FLAG \
            -validate-build-files \
            -language all

      # ── Force full build on main ──────────────────────────────
      - name: Full build on main merge
        if: needs.detect.outputs.is_main == 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then BT=./build-tool.exe; else BT=./build-tool; fi
          $BT -root . -force -validate-build-files -language all
