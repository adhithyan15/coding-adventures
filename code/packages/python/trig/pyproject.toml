[project]
name = "coding-adventures-trig"
version = "0.1.0"
description = "Trigonometric functions from first principles using Taylor series"
requires-python = ">=3.9"

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trig"]
