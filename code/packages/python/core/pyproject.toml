[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-core"
version = "0.1.0"
description = "Configurable processor core — integrates pipeline, caches, branch predictor, hazard detection into a complete CPU core"
requires-python = ">=3.12"
dependencies = [
    "coding-adventures-branch-predictor",
    "coding-adventures-cache",
    "coding-adventures-clock",
    "coding-adventures-cpu-pipeline",
    "coding-adventures-hazard-detection",
]
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["cpu", "core", "processor", "pipeline", "computer-architecture", "education"]
dependencies = ["coding-adventures-directed-graph", "coding-adventures-state-machine"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/adhithyan15/coding-adventures"
Repository = "https://github.com/adhithyan15/coding-adventures"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "coding-adventures-arithmetic",
    "coding-adventures-branch-predictor",
    "coding-adventures-cache",
    "coding-adventures-clock",
    "coding-adventures-cpu-pipeline",
    "coding-adventures-cpu-simulator",
    "coding-adventures-hazard-detection",
]

[tool.hatch.build.targets.wheel]
packages = ["src/core"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python syntax)
    "B",    # bugbear (common bugs)
    "SIM",  # simplify
    "ANN",  # type annotation enforcement
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=core --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/core"]

[tool.coverage.report]
fail_under = 80
show_missing = true
