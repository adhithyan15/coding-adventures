[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-fab-process-simulation"
version = "0.1.0"
description = "1-D analytical CMOS process flow simulator (oxidation, lithography, etch, implant, diffusion)."
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
keywords = ["fab", "process", "tcad", "cmos", "oxidation", "implant", "education"]
dependencies = [
    "coding-adventures-device-physics",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Education",
    "Topic :: Education",
    "Topic :: Scientific/Engineering :: Physics",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
    "Typing :: Typed",
]

[project.urls]
Documentation = "https://github.com/adhithyan15/coding-adventures/tree/main/code/specs/fab-process-simulation.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/fab_process_simulation"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN", "E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=fab_process_simulation --cov-report=term-missing --cov-fail-under=85"

[tool.coverage.run]
source = ["src/fab_process_simulation"]

[tool.coverage.report]
fail_under = 85
show_missing = true
