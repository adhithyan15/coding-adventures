[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-oct-wasm-compiler"
version = "0.1.0"
description = "End-to-end Oct to WebAssembly compiler"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-oct-lexer",
    "coding-adventures-oct-parser",
    "coding-adventures-oct-type-checker",
    "coding-adventures-oct-ir-compiler",
    "coding-adventures-ir-to-wasm-validator",
    "coding-adventures-ir-to-wasm-assembly",
    "coding-adventures-wasm-assembler",
    "coding-adventures-wasm-validator",
]

[tool.uv.sources]
coding-adventures-graph = { path = "../graph", editable = true }
coding-adventures-directed-graph = { path = "../directed-graph", editable = true }
coding-adventures-grammar-tools = { path = "../grammar-tools", editable = true }
coding-adventures-lexer = { path = "../lexer", editable = true }
coding-adventures-parser = { path = "../parser", editable = true }
coding-adventures-state-machine = { path = "../state-machine", editable = true }
coding-adventures-type-checker-protocol = { path = "../type-checker-protocol", editable = true }
coding-adventures-oct-lexer = { path = "../oct-lexer", editable = true }
coding-adventures-oct-parser = { path = "../oct-parser", editable = true }
coding-adventures-oct-type-checker = { path = "../oct-type-checker", editable = true }
coding-adventures-compiler-ir = { path = "../compiler-ir", editable = true }
coding-adventures-oct-ir-compiler = { path = "../oct-ir-compiler", editable = true }
coding-adventures-wasm-leb128 = { path = "../wasm-leb128", editable = true }
coding-adventures-wasm-types = { path = "../wasm-types", editable = true }
coding-adventures-wasm-opcodes = { path = "../wasm-opcodes", editable = true }
coding-adventures-wasm-module-parser = { path = "../wasm-module-parser", editable = true }
coding-adventures-wasm-validator = { path = "../wasm-validator", editable = true }
coding-adventures-wasm-execution = { path = "../wasm-execution", editable = true }
coding-adventures-wasm-runtime = { path = "../wasm-runtime", editable = true }
coding-adventures-wasm-module-encoder = { path = "../wasm-module-encoder", editable = true }
coding-adventures-ir-to-wasm-compiler = { path = "../ir-to-wasm-compiler", editable = true }
coding-adventures-ir-to-wasm-validator = { path = "../ir-to-wasm-validator", editable = true }
coding-adventures-ir-to-wasm-assembly = { path = "../ir-to-wasm-assembly", editable = true }
coding-adventures-wasm-assembler = { path = "../wasm-assembler", editable = true }

[project.optional-dependencies]
dev = [
    "coding-adventures-graph",
    "coding-adventures-directed-graph",
    "coding-adventures-grammar-tools",
    "coding-adventures-lexer",
    "coding-adventures-parser",
    "coding-adventures-state-machine",
    "coding-adventures-type-checker-protocol",
    "coding-adventures-compiler-ir",
    "coding-adventures-wasm-runtime",
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/oct_wasm_compiler"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=oct_wasm_compiler --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/oct_wasm_compiler"]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.mypy]
python_version = "3.12"

[[tool.mypy.overrides]]
module = [
    "oct_parser",
    "oct_type_checker",
    "oct_ir_compiler",
    "ir_to_wasm_assembly",
    "ir_to_wasm_compiler",
    "ir_to_wasm_validator",
    "wasm_assembler",
    "wasm_validator",
]
ignore_missing_imports = true
