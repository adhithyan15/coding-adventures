[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "coding-adventures-audio-device-sink"
version = "0.1.0"
description = "Rust-backed Python audio device sink for signed 16-bit PCM buffers"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "coding-adventures-trig>=0.1.0",
    "coding-adventures-oscillator>=0.1.0",
    "coding-adventures-pcm-audio>=0.1.0",
]

[tool.uv.sources]
coding-adventures-trig = { path = "../trig", editable = true }
coding-adventures-oscillator = { path = "../oscillator", editable = true }
coding-adventures-pcm-audio = { path = "../pcm-audio", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=audio_device_sink --cov-report=term-missing --cov-fail-under=80"
