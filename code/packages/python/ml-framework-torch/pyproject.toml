[project]
name = "coding-adventures-ml-framework-torch"
version = "0.1.0"
description = "PyTorch-compatible API built on ml-framework-core"
requires-python = ">=3.12"
dependencies = [
    "coding-adventures-ml-framework-core",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ml_framework_torch"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
src = ["src", "tests"]
