[project]
name = "coding-adventures-resistor"
version = "0.1.0"
description = "Ideal resistor modeling and resistor network helpers from first principles"
requires-python = ">=3.9"

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coding_adventures_resistor"]
