[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "coding-adventures-wasm-execution"
version = "0.1.0"
description = "WebAssembly 1.0 wasm-execution"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Adhithya Rajasekaran" }]
readme = "README.md"
dependencies = [
    "coding-adventures-wasm-leb128",
    "coding-adventures-wasm-types",
    "coding-adventures-wasm-opcodes",
    "coding-adventures-wasm-module-parser",
    "coding-adventures-virtual-machine",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "ruff>=0.4", "mypy>=1.10"]

[tool.hatch.build.targets.wheel]
packages = ["src/wasm_execution"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B", "SIM", "ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=wasm_execution --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
source = ["src/wasm_execution"]

[tool.coverage.report]
fail_under = 80
show_missing = true
