[workspace]

[package]
name = "skip-list-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for the Rust skip-list crate via wasm-bindgen"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
js-sys = "0.3"
skip-list = { path = "../../rust/skip-list" }
wasm-bindgen = "0.2"
