[package]
name = "paint-vm-direct2d"
version = "0.1.0"
edition = "2021"
description = "Direct2D renderer for the paint-instructions scene model (P2D06)"

[dependencies]
paint-instructions = { path = "../paint-instructions" }
paint-vm-runtime = { path = "../paint-vm-runtime" }
window-core = { path = "../window-core" }
window-win32 = { path = "../window-win32" }

[dependencies.windows]
version = "0.58"
features = [
    "Foundation_Numerics",
    "Win32_Graphics_Direct2D",
    "Win32_Graphics_Direct2D_Common",
    "Win32_Graphics_DirectWrite",
    "Win32_Graphics_Gdi",
    "Win32_Graphics_Imaging",
    "Win32_Graphics_Imaging_D2D",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Dxgi_Common",
    "Win32_System_LibraryLoader",
    "Win32_System_Com",
    "Win32_UI_WindowsAndMessaging",
]

[dev-dependencies]
paint-codec-png = { path = "../paint-codec-png" }
text-interfaces = { path = "../text-interfaces" }
text-native = { path = "../text-native" }
